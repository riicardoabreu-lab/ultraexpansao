<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infolink · Portal</title>
<style>
  :root{
    --green:#00B050; --darkgreen:#375623; --cyan:#00d4c8;
    --bg:#0c1f16; --panel:#132a1e; --panel2:#173226;
    --text:#eafaf0; --muted:#8fb8a1; --border:#204531; --error:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:radial-gradient(circle at top left,#123423,var(--bg) 60%);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
  }
  .login-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:36px 32px;
    width:100%;
    max-width:340px;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
  }
  .login-box h1{ margin:0 0 4px; font-size:20px; }
  .login-box h1 span{color:var(--cyan);}
  .login-box p{ margin:0 0 24px; color:var(--muted); font-size:13px; }
  label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  input[type="text"], input[type="password"]{
    width:100%; padding:10px 12px; margin-bottom:16px;
    border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text); font-size:14px;
  }
  input:focus{outline:2px solid var(--cyan);}
  button{
    width:100%; padding:11px; border:none; border-radius:8px;
    background:linear-gradient(135deg,var(--green),var(--darkgreen));
    color:#fff; font-weight:600; font-size:14px; cursor:pointer; transition:.15s;
  }
  button:hover{opacity:.9;}
  .error{ color:var(--error); font-size:13px; margin-top:12px; display:none; }
</style>
</head>
<body>

<div class="login-box">
  <h1>Infolink<span> · Portal</span></h1>
  <p>Acesso restrito. Informe usuário e senha para ver as ferramentas.</p>

  <form id="loginForm" autocomplete="off">
    <label for="user">Usuário</label>
    <input type="text" id="user" autocomplete="username" required>

    <label for="pass">Senha</label>
    <input type="password" id="pass" autocomplete="current-password" required>

    <button type="submit">Entrar</button>
    <div class="error" id="errorMsg">Usuário ou senha incorretos.</div>
  </form>
</div>

<script>
  // ATENÇÃO: proteção apenas visual/afastadora de acesso casual.
  // Mesma ressalva do CFO: qualquer pessoa com acesso ao código-fonte
  // vê as credenciais abaixo. Troque a senha antes de compartilhar o link.
  //
  // Esta é a MESMA credencial usada no CFO (chave de sessão compartilhada
  // 'infolink_hub_auth'), então ao entrar aqui uma vez você não precisa
  // logar de novo ao abrir o CFO a partir do menu.
  const CREDENCIAIS = [
    { user: "infolink", pass: "altere-esta-senha" }
  ];

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value;

    const ok = CREDENCIAIS.some(c => c.user === user && c.pass === pass);

    if (ok){
      sessionStorage.setItem('infolink_hub_auth', 'ok');
      sessionStorage.setItem('cfo_auth', 'ok'); // libera o CFO direto, sem pedir login de novo
      window.location.href = 'home.html';
    } else {
      errorMsg.style.display = 'block';
    }
  });
</script>

</body>
</html>
