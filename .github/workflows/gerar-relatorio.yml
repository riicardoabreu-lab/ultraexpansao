name: Gerar Relatório de Bairro

on:
  push:
    branches: [main]
    paths:
      - "cfo/csv-input/**"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: gerar-relatorio
  cancel-in-progress: false

jobs:
  gerar-relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r cfo/requirements.txt

      - name: Gerar relatório(s) .xlsx por bairro
        run: python cfo/scripts/gerar_relatorio_bairro.py

      - name: Atualizar dashboard.html
        run: python cfo/scripts/atualizar_dashboard.py

      - name: Commit e push das alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfo/relatorios cfo/dashboard.html
          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
          else
            git commit -m "Atualiza relatório e dashboard automaticamente [skip ci]"
            git push
          fi
