<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infolink · Portal</title>
<style>
  :root{
    --green:#00B050; --darkgreen:#375623; --cyan:#00d4c8;
    --bg:#0c1f16; --panel:#132a1e; --panel2:#173226;
    --text:#eafaf0; --muted:#8fb8a1; --border:#204531; --error:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:radial-gradient(circle at top left,#123423,var(--bg) 60%);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
  }
  .login-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:36px 32px;
    width:100%;
    max-width:340px;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
  }
  .login-box h1{ margin:0 0 4px; font-size:20px; }
  .login-box h1 span{color:var(--cyan);}
  .login-box p{ margin:0 0 24px; color:var(--muted); font-size:13px; }
  label{ display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
  input[type="text"], input[type="email"], input[type="password"]{
    width:100%; padding:10px 12px; margin-bottom:16px;
    border-radius:8px; border:1px solid var(--border);
    background:var(--panel2); color:var(--text); font-size:14px;
  }
  input:focus{outline:2px solid var(--cyan);}
  button{
    width:100%; padding:11px; border:none; border-radius:8px;
    background:#0066cc;
    color:#fff; font-weight:600; font-size:14px; cursor:pointer; transition:.15s;
  }
  button:hover{opacity:.9;}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .error{ color:var(--error); font-size:13px; margin-top:12px; display:none; }
  .success{ color:var(--cyan); font-size:13px; margin-top:12px; display:none; }
  #forgotLink:hover{ color:var(--cyan); text-decoration:underline; }
</style>
</head>
<body>

<div class="login-box">
  <h1>Infolink<span> · Portal</span></h1>
  <p>Use o mesmo e-mail e senha do ISP Manage. Isso também libera o CFO e o Controle KM sem pedir login de novo.</p>

  <form id="loginForm" autocomplete="off">
    <label for="email">E-mail</label>
    <input type="email" id="email" autocomplete="username" required>

    <label for="pass">Senha</label>
    <input type="password" id="pass" autocomplete="current-password" required>

    <button type="submit" id="loginBtn">Entrar</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
  </form>
  <a href="#" id="forgotLink" style="display:block;text-align:center;margin-top:14px;font-size:12px;color:var(--muted);text-decoration:none;">Esqueci minha senha</a>
</div>

<!-- Firebase: MESMO projeto usado pelo ISP Manage (isp-manager-ce), para
     que o login aqui já autentique também o ISP Manage automaticamente
     (mesma origem = mesmo sessionStorage). -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserSessionPersistence }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const fb = initializeApp({
    apiKey: "AIzaSyCryi9kBLRbe1Vc8nqwYa886Pc9GxaXWwU",
    authDomain: "isp-manager-ce.firebaseapp.com",
    projectId: "isp-manager-ce",
    storageBucket: "isp-manager-ce.firebasestorage.app",
    messagingSenderId: "374725918192",
    appId: "1:374725918192:web:5afa4ee05de2db85bbf135"
  });
  const auth = getAuth(fb);
  setPersistence(auth, browserSessionPersistence).catch(()=>{});

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const btn = document.getElementById('loginBtn');

  const msgs = {
    'auth/invalid-credential': 'E-mail ou senha incorretos.',
    'auth/user-not-found': 'Usuário não encontrado.',
    'auth/wrong-password': 'Senha incorreta.',
    'auth/invalid-email': 'E-mail inválido. Digite o e-mail no campo acima antes de clicar aqui.',
    'auth/too-many-requests': 'Muitas tentativas. Tente novamente mais tarde.',
    'auth/network-request-failed': 'Erro de conexão. Verifique sua internet.'
  };

  form.addEventListener('submit', function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value;
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Entrando...';

    signInWithEmailAndPassword(auth, email, pass).then(()=>{
      // Libera também o CFO (login simples por senha fixa)
      sessionStorage.setItem('infolink_hub_auth', 'ok');
      sessionStorage.setItem('cfo_auth', 'ok');
      window.location.href = 'home.html';
    }).catch(err=>{
      btn.disabled = false; btn.textContent = 'Entrar';
      errorMsg.textContent = msgs[err.code] || err.message;
      errorMsg.style.display = 'block';
    });
  });

  document.getElementById('forgotLink').addEventListener('click', function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    if(!email){
      errorMsg.textContent = 'Digite seu e-mail no campo acima primeiro, depois clique em "Esqueci minha senha".';
      errorMsg.style.display = 'block';
      return;
    }
    sendPasswordResetEmail(auth, email).then(()=>{
      successMsg.textContent = 'Enviamos um link de redefinição de senha para ' + email + '. Verifique sua caixa de entrada (e o spam).';
      successMsg.style.display = 'block';
    }).catch(err=>{
      errorMsg.textContent = msgs[err.code] || err.message;
      errorMsg.style.display = 'block';
    });
  });
</script>

</body>
</html>
