<script type="module">
  // Mesma ferramenta da Auditoria LB (repositório separado), só que aqui
  // dentro do portal, com o login normal do ultraexpansao em vez do login
  // próprio da equipe de campo.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const fb = initializeApp({
    apiKey: "AIzaSyCryi9kBLRbe1Vc8nqwYa886Pc9GxaXWwU",
    authDomain: "isp-manager-ce.firebaseapp.com",
    projectId: "isp-manager-ce",
    storageBucket: "isp-manager-ce.firebasestorage.app",
    messagingSenderId: "374725918192",
    appId: "1:374725918192:web:5afa4ee05de2db85bbf135"
  });
  const auth = getAuth(fb);
  const fsDb = getFirestore(fb);
  window._doLogout = function(){
    signOut(auth).finally(()=>{
      sessionStorage.clear();
      window.location.href = '../index.html';
    });
  };

  // ---- Sincronização em tempo real com a nuvem (Firestore) ----
  // Mesma coleção compartilhada (auditoria_lb) que a Auditoria LB usa —
  // qualquer alteração feita pela equipe de campo aparece aqui na hora.
  window._fbSaveAudit = (protocolo, rec) => {
    return setDoc(doc(fsDb, 'auditoria_lb', String(protocolo)), {
      status: rec.status,
      auditor: rec.auditor,
      data_vistoria: rec.data_vistoria,
      itens_auditados: rec.itens_auditados,
      atualizado_em: Date.now(),
    });
  };

  onAuthStateChanged(auth, user => {
    if(!user){
      window.location.href = '../index.html';
      return;
    }
    window._fbUser = user;
    onSnapshot(collection(fsDb, 'auditoria_lb'), snap => {
      const parsed = {};
      snap.forEach(docSnap => {
        const d = docSnap.data();
        parsed[docSnap.id] = {
          status: d.status || 'pendente',
          auditor: d.auditor || null,
          data_vistoria: d.data_vistoria || null,
          itens_auditados: d.itens_auditados || {},
        };
      });
      if(window._applyAuditData) window._applyAuditData(parsed);
    }, err => {
      console.error('Falha no listener de auditorias:', err);
      if(window._applyAuditError) window._applyAuditError(err);
    });
  });
</script>

const MONTH_NAMES = {
  "01":"Jan","02":"Fev","03":"Mar","04":"Abr","05":"Mai","06":"Jun",
  "07":"Jul","08":"Ago","09":"Set","10":"Out","11":"Nov","12":"Dez"
};

let activeMonth = "todos";
let activeStatus = "todas";
let searchTerm = "";
let auditData = {}; // { protocolo: { status, auditor, data_vistoria, itens_auditados: {produto: qtd} } }
let storageReady = false;

function getAudit(prot) {
  return auditData[prot] || { status: "pendente", auditor: null, data_vistoria: null, itens_auditados: {} };
}

function setSyncStatus(state) {
  const dot = document.getElementById("syncDot");
  const text = document.getElementById("syncText");
  dot.className = "sync-dot" + (state === "ok" ? " ok" : state === "saving" ? " saving" : "");
  text.textContent = state === "ok" ? "auditorias sincronizadas com a equipe (tempo real)"
    : state === "saving" ? "salvando..."
    : state === "error" ? "não foi possível sincronizar — alterações só nesta aba"
    : "carregando auditorias...";
}

// Chamado pelo listener em tempo real do Firestore (módulo no <head>)
// sempre que qualquer pessoa da equipe salva uma auditoria.
function applyAuditData(parsed) {
  auditData = parsed;
  storageReady = true;
  setSyncStatus("ok");
  render();
}
window._applyAuditData = applyAuditData;

// Chamado se o listener em tempo real falhar (ex: regras do Firestore
// ainda não liberando esta coleção pra essa conta) — mostra um erro
// visível em vez de deixar "carregando..." pra sempre.
function applyAuditError(err) {
  storageReady = true;
  setSyncStatus("error");
  const results = document.getElementById("results");
  const isPermission = err && err.code === "permission-denied";
  results.innerHTML = `<div class="empty">⚠️ Não foi possível carregar as auditorias.<br>` +
    (isPermission
      ? "As regras do Firestore ainda não liberam esta conta pra ler/gravar a auditoria — avise quem administra o site."
      : "Verifique sua conexão e recarregue a página.") +
    `</div>`;
}
window._applyAuditError = applyAuditError;

async function saveAudit(prot) {
  if (!window._fbSaveAudit) { setSyncStatus("error"); return; }
  setSyncStatus("saving");
  const rec = getAudit(prot);
  try {
    await window._fbSaveAudit(prot, rec);
    setSyncStatus("ok");
  } catch (e) {
    setSyncStatus("error");
    console.error("Falha ao salvar auditoria:", e);
  }
}

function monthLabel(m) {
  const [y, mm] = m.split("-");
  return MONTH_NAMES[mm] + "/" + y;
}

function renderMonthButtons() {
  const wrap = document.getElementById("monthButtons");
  wrap.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "month-btn" + (activeMonth === "todos" ? " active" : "");
  allBtn.textContent = "Todos os meses";
  allBtn.onclick = () => { activeMonth = "todos"; render(); };
  wrap.appendChild(allBtn);
  DATA.meses.forEach(m => {
    const btn = document.createElement("button");
    btn.className = "month-btn" + (activeMonth === m ? " active" : "");
    btn.textContent = monthLabel(m);
    btn.onclick = () => { activeMonth = m; render(); };
    wrap.appendChild(btn);
  });
}

function renderStatusButtons() {
  const wrap = document.getElementById("statusButtons");
  wrap.innerHTML = "";
  const opts = [["todas","Todas"],["pendente","Pendentes"],["vistoriado","Vistoriadas"]];
  opts.forEach(([val, label]) => {
    const btn = document.createElement("button");
    btn.className = "status-btn" + (activeStatus === val ? " active" : "");
    btn.textContent = label;
    btn.onclick = () => { activeStatus = val; render(); };
    wrap.appendChild(btn);
  });
}

function matchesSearch(rec, term) {
  if (!term) return true;
  term = term.toLowerCase();
  if (String(rec.protocolo).includes(term)) return true;
  if (String(rec.numero_nota).includes(term)) return true;
  if (rec.tipo_os.toLowerCase().includes(term)) return true;
  if (rec.local && rec.local.toLowerCase().includes(term)) return true;
  if (rec.descricao_acionamento && rec.descricao_acionamento.toLowerCase().includes(term)) return true;
  if (rec.caixas_emenda.some(c => c.numero_serie.toLowerCase().includes(term))) return true;
  return rec.materiais.some(m => m.produto.toLowerCase().includes(term));
}

function getFiltered() {
  return DATA.records.filter(r => {
    const monthOk = activeMonth === "todos" || r.mes === activeMonth;
    const status = getAudit(r.protocolo).status;
    const statusOk = activeStatus === "todas" || status === activeStatus;
    return monthOk && statusOk && matchesSearch(r, searchTerm);
  });
}

function renderStats(filtered) {
  const row = document.getElementById("statsRow");
  const totalOS = filtered.length;
  const totalItens = filtered.reduce((s, r) => s + r.materiais.length, 0);
  const totalCaixas = filtered.reduce((s, r) => s + r.caixas_emenda.length, 0);
  const locaisUnicos = new Set(filtered.filter(r => r.local).map(r => r.local)).size;
  const vistoriadas = filtered.filter(r => getAudit(r.protocolo).status === "vistoriado").length;

  row.innerHTML = `
    <div class="stat"><div class="num">${totalOS}</div><div class="label">Ordens de Serviço</div></div>
    <div class="stat"><div class="num">${vistoriadas} / ${totalOS}</div><div class="label">Vistoriadas</div></div>
    <div class="stat"><div class="num">${locaisUnicos}</div><div class="label">Localidades Distintas</div></div>
    <div class="stat"><div class="num">${totalCaixas}</div><div class="label">Caixas de Emenda (CEO)</div></div>
  `;
}

function render() {
  renderMonthButtons();
  renderStatusButtons();
  const filtered = getFiltered();
  renderStats(filtered);
  const results = document.getElementById("results");
  results.innerHTML = "";

  if (!storageReady) {
    results.innerHTML = '<div class="empty">Carregando dados de auditoria...</div>';
    return;
  }

  if (filtered.length === 0) {
    results.innerHTML = '<div class="empty">Nenhuma OS encontrada com esse filtro.</div>';
    return;
  }

  if (activeMonth === "todos") {
    DATA.meses.forEach(m => {
      const group = filtered.filter(r => r.mes === m);
      if (group.length === 0) return;
      const h = document.createElement("div");
      h.className = "month-header";
      h.textContent = monthLabel(m) + " — " + group.length + " OS";
      results.appendChild(h);
      group.forEach(r => results.appendChild(buildCard(r)));
    });
  } else {
    filtered.forEach(r => results.appendChild(buildCard(r)));
  }
}

function toggleVistoriado(prot) {
  const auditor = document.getElementById("auditorInput").value.trim();
  const current = getAudit(prot);
  if (current.status === "vistoriado") {
    auditData[prot] = { ...current, status: "pendente", auditor: null, data_vistoria: null };
  } else {
    if (!auditor) {
      alert("Informe o nome do auditor(a) antes de marcar como vistoriado.");
      return;
    }
    auditData[prot] = { ...current, status: "vistoriado", auditor: auditor, data_vistoria: new Date().toISOString() };
  }
  saveAudit(prot);
  render();
}

function updateItemAudit(prot, produto, value) {
  const current = getAudit(prot);
  const itens = { ...current.itens_auditados };
  if (value === "" || value === null) {
    delete itens[produto];
  } else {
    itens[produto] = Number(value);
  }
  auditData[prot] = { ...current, itens_auditados: itens };
  saveAudit(prot);
}

// Atualiza o "-6"/"OK" ao lado do campo enquanto a pessoa digita, sem
// redesenhar a tela inteira (senão perderia o foco a cada tecla). O
// salvamento de verdade (Firestore) só acontece no "change" (ao sair
// do campo), como já era.
function liveUpdateDiff(inputEl) {
  const td = inputEl.closest("td");
  const tr = inputEl.closest("tr");
  const qtySistema = Number(tr.querySelector("td.qty").textContent);
  const raw = inputEl.value;
  const existingTag = td.querySelector(".diff-tag");

  inputEl.classList.remove("match", "diff");
  if (raw === "") {
    if (existingTag) existingTag.remove();
    return;
  }
  const val = Number(raw);
  const isMatch = val === qtySistema;
  const delta = val - qtySistema;
  const html = isMatch
    ? `<span class="diff-tag match">OK</span>`
    : `<span class="diff-tag diff">${delta > 0 ? "+" : ""}${delta}</span>`;
  if (existingTag) existingTag.outerHTML = html;
  else td.insertAdjacentHTML("beforeend", html);
  inputEl.classList.add(isMatch ? "match" : "diff");
}

function buildCard(rec) {
  const audit = getAudit(rec.protocolo);
  const isVistoriado = audit.status === "vistoriado";

  const card = document.createElement("div");
  card.className = "card" + (isVistoriado ? " vistoriado" : "");

  const mapPinHtml = rec.maps_url
    ? `<a class="map-pin" href="${rec.maps_url}" target="_blank" rel="noopener" title="Ver localização de ${rec.local || 'esta OS'} no mapa" onclick="event.stopPropagation()">${PIN_SVG}</a>`
    : `<span class="map-pin disabled" title="Localização não informada">${PIN_SVG}</span>`;

  const ceoHtml = rec.caixas_emenda.length
    ? `<span class="ceo-tag">${rec.caixas_emenda.length} CEO${rec.caixas_emenda.length > 1 ? 's' : ''}</span>`
    : '';

  const statusPillHtml = isVistoriado
    ? `<button class="status-pill vistoriado" data-prot="${rec.protocolo}">${CHECK_SVG} Vistoriado</button>`
    : `<button class="status-pill pendente" data-prot="${rec.protocolo}">Marcar vistoriado</button>`;

  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML = `
    <div class="left">
      <span class="badge">Protocolo ${rec.protocolo}</span>
      <span class="os-tag">Nota ${rec.numero_nota}</span>
      ${mapPinHtml}
      <span class="local-name">${rec.local || 'Local não informado'}</span>
      ${ceoHtml}
      ${statusPillHtml}
    </div>
    <div class="left">
      <span class="meta">${rec.data_abertura.split(" ")[0]} → ${rec.data_encerramento.split(" ")[0]}</span>
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  `;
  head.querySelector(".status-pill").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleVistoriado(rec.protocolo);
  });
  head.addEventListener("click", (e) => {
    if (e.target.closest(".status-pill") || e.target.closest(".map-pin")) return;
    card.classList.toggle("open");
  });

  const body = document.createElement("div");
  body.className = "card-body";

  if (rec.descricao_acionamento) {
    const desc = document.createElement("div");
    desc.className = "desc-row";
    desc.innerHTML = `<b>Acionamento:</b> ${rec.descricao_acionamento} &nbsp;·&nbsp; <b>Tipo OS:</b> ${rec.tipo_os}`;
    body.appendChild(desc);
  }

  if (rec.maps_links && rec.maps_links.length > 1) {
    const loc = document.createElement("div");
    loc.className = "loc-row";
    loc.innerHTML = rec.maps_links.map((url, i) => `<a class="map-link" href="${url}" target="_blank" rel="noopener">📍 Ver CEO ${i+1} no mapa</a>`).join(" ");
    body.appendChild(loc);
  }

  if (isVistoriado) {
    const info = document.createElement("div");
    info.className = "audit-info";
    const dt = audit.data_vistoria ? new Date(audit.data_vistoria).toLocaleString("pt-BR") : "";
    info.innerHTML = `✓ Vistoriado por <b>${audit.auditor}</b> em ${dt}`;
    body.appendChild(info);
  }

  const table = document.createElement("table");
  const theadHtml = `<thead><tr><th>Material</th><th>Unidade</th><th style="text-align:right">Qtd. Sistema</th><th style="text-align:right">Qtd. Auditada</th></tr></thead>`;
  const rowsHtml = rec.materiais.map(m => {
    const isCeo = m.produto.includes("CAIXA DE EMENDA");
    const auditedVal = audit.itens_auditados[m.produto];
    const hasAudit = auditedVal !== undefined && auditedVal !== null;
    let cls = "";
    let diffTag = "";
    if (hasAudit) {
      if (Number(auditedVal) === m.quantidade) {
        cls = "match";
        diffTag = `<span class="diff-tag match">OK</span>`;
      } else {
        cls = "diff";
        const delta = Number(auditedVal) - m.quantidade;
        diffTag = `<span class="diff-tag diff">${delta > 0 ? "+" : ""}${delta}</span>`;
      }
    }
    return `<tr class="${isCeo ? 'ceo-row' : ''}">
      <td>${m.produto}</td>
      <td>${m.unidade}</td>
      <td class="qty">${m.quantidade}</td>
      <td class="audit-cell">
        <input type="number" class="audit-input ${cls}" min="0"
          value="${hasAudit ? auditedVal : ''}"
          data-prot="${rec.protocolo}" data-produto="${m.produto.replace(/"/g,'&quot;')}"
          placeholder="—">
        ${diffTag}
      </td>
    </tr>`;
  }).join("");
  table.innerHTML = theadHtml + `<tbody>${rowsHtml}</tbody>`;
  table.querySelectorAll(".audit-input").forEach(input => {
    input.addEventListener("input", (e) => liveUpdateDiff(e.target));
    input.addEventListener("change", (e) => {
      updateItemAudit(rec.protocolo, e.target.dataset.produto, e.target.value);
      render();
      // re-open this card after re-render since render() rebuilds the DOM
      const reopened = [...document.querySelectorAll(".card")].find(c => c.querySelector(`.status-pill[data-prot="${rec.protocolo}"]`));
      if (reopened) reopened.classList.add("open");
    });
  });
  body.appendChild(table);

  if (rec.caixas_emenda.length) {
    const ceoBlock = document.createElement("div");
    ceoBlock.className = "ceo-block";
    ceoBlock.innerHTML = `
      <div class="ceo-title">Nº de série das CEOs utilizadas</div>
      ${rec.caixas_emenda.map(c => `<span class="ceo-chip">${c.numero_serie}</span>`).join("")}
    `;
    body.appendChild(ceoBlock);
  }

  card.appendChild(head);
  card.appendChild(body);
  return card;
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchTerm = e.target.value.trim();
  render();
});

function downloadReport() {
  if (typeof XLSX === "undefined") {
    alert("A biblioteca de exportação ainda está carregando. Aguarde um instante e tente novamente.");
    return;
  }

  const headers = [
    "Protocolo","Nº Nota","Mês","Local","Tipo OS","Descrição Acionamento",
    "Material","Unidade","Qtd. Sistema","Qtd. Auditada","Diferença",
    "Status Auditoria","Auditor","Data Vistoria"
  ];
  const aoa = [headers];
  const merges = [];

  DATA.records.forEach(rec => {
    const audit = getAudit(rec.protocolo);
    const dt = audit.data_vistoria ? new Date(audit.data_vistoria).toLocaleString("pt-BR") : "";
    const startRow = aoa.length;
    rec.materiais.forEach(m => {
      const auditedVal = audit.itens_auditados[m.produto];
      const hasAudit = auditedVal !== undefined && auditedVal !== null;
      const diff = hasAudit ? (Number(auditedVal) - m.quantidade) : "";
      aoa.push([
        rec.protocolo,
        rec.numero_nota,
        monthLabel(rec.mes),
        rec.local || "",
        rec.tipo_os,
        rec.descricao_acionamento || "",
        m.produto,
        m.unidade,
        m.quantidade,
        hasAudit ? auditedVal : "",
        diff,
        audit.status === "vistoriado" ? "Vistoriado" : "Pendente",
        audit.auditor || "",
        dt
      ]);
    });
    const endRow = aoa.length - 1;
    if (endRow > startRow) {
      // Merge Protocolo..Descrição Acionamento columns (0-5) across this OS's material rows
      for (let c = 0; c <= 5; c++) {
        merges.push({ s: { r: startRow, c: c }, e: { r: endRow, c: c } });
      }
    }
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!merges"] = merges;
  ws["!cols"] = [
    { wch: 11 }, { wch: 10 }, { wch: 9 }, { wch: 24 }, { wch: 26 },
    { wch: 34 }, { wch: 32 }, { wch: 10 }, { wch: 12 }, { wch: 12 },
    { wch: 11 }, { wch: 15 }, { wch: 20 }, { wch: 18 }
  ];
  ws["!autofilter"] = { ref: XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: 0, c: headers.length - 1 } }) };

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Auditoria por OS");

  // Sheet 2: resumo por OS
  const summaryHeaders = ["Protocolo","Nº Nota","Mês","Local","Status Auditoria","Auditor","Data Vistoria","Qtd. Itens","Itens com Diferença"];
  const summaryRows = [summaryHeaders];
  DATA.records.forEach(rec => {
    const audit = getAudit(rec.protocolo);
    const dt = audit.data_vistoria ? new Date(audit.data_vistoria).toLocaleString("pt-BR") : "";
    let diffCount = 0;
    rec.materiais.forEach(m => {
      const av = audit.itens_auditados[m.produto];
      if (av !== undefined && av !== null && Number(av) !== m.quantidade) diffCount++;
    });
    summaryRows.push([
      rec.protocolo, rec.numero_nota, monthLabel(rec.mes), rec.local || "",
      audit.status === "vistoriado" ? "Vistoriado" : "Pendente",
      audit.auditor || "", dt, rec.materiais.length, diffCount
    ]);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws2["!cols"] = [{ wch: 11 }, { wch: 10 }, { wch: 9 }, { wch: 24 }, { wch: 15 }, { wch: 20 }, { wch: 18 }, { wch: 11 }, { wch: 17 }];
  ws2["!autofilter"] = { ref: XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: 0, c: summaryHeaders.length - 1 } }) };
  XLSX.utils.book_append_sheet(wb, ws2, "Resumo por OS");

  const today = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `relatorio_materiais_auditoria_${today}.xlsx`);
}

document.getElementById("downloadBtn").addEventListener("click", downloadReport);
