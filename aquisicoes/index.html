<script>
  // Bloqueia acesso direto a esta página sem passar pelo login do portal.
  if (sessionStorage.getItem('infolink_hub_auth') !== 'ok') {
    window.location.href = '../index.html';
  }
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  const fb = initializeApp({
    apiKey: "AIzaSyCryi9kBLRbe1Vc8nqwYa886Pc9GxaXWwU",
    authDomain: "isp-manager-ce.firebaseapp.com",
    projectId: "isp-manager-ce",
    storageBucket: "isp-manager-ce.firebasestorage.app",
    messagingSenderId: "374725918192",
    appId: "1:374725918192:web:5afa4ee05de2db85bbf135"
  });
  const auth = getAuth(fb);
  const fsDb = getFirestore(fb);
  window._doLogout = function(){
    signOut(auth).finally(()=>{
      sessionStorage.clear();
      window.location.href = '../index.html';
    });
  };

  // ---- Sincronização em tempo real com a nuvem (Firestore) ----
  // Mesmo projeto Firebase do ISP Manage: quem loga com a mesma conta vê,
  // na hora (sem precisar recarregar a página), o que qualquer outra
  // pessoa salvar em outro navegador/dispositivo. Em caso de edição
  // simultânea, vale a última que salvou (last write wins).
  window._lastKnownUpdated = 0;
  window._cloudSave = (data) => {
    if(!window._fbUser) return Promise.resolve();
    window._lastKnownUpdated = data.updated;
    return setDoc(doc(fsDb, 'aquisicoes_backups', window._fbUser.uid), data);
  };

  // ---- KMZ na nuvem (documento à parte por provedor) ----
  // Fica fora do backup principal pra não inflar aquele documento com
  // arquivos de rede de todos os provedores de uma vez. Só sincroniza se
  // couber com folga no limite de ~1MB por documento do Firestore.
  window._fbSaveKmz = (empresaId, kmz) => {
    if(!window._fbUser) return Promise.resolve();
    return setDoc(doc(fsDb, 'aquisicoes_kmz', empresaId), { ...kmz, uid: window._fbUser.uid, atualizado_em: Date.now() });
  };
  window._fbGetKmz = async (empresaId) => {
    const snap = await getDoc(doc(fsDb, 'aquisicoes_kmz', empresaId));
    return snap.exists() ? snap.data() : null;
  };
  window._fbDeleteKmz = (empresaId) => {
    return deleteDoc(doc(fsDb, 'aquisicoes_kmz', empresaId)).catch(err => console.error('Falha ao remover KMZ da nuvem:', err));
  };

  onAuthStateChanged(auth, user => {
    if(!user) return;
    window._fbUser = user;
    onSnapshot(doc(fsDb, 'aquisicoes_backups', user.uid), snap => {
      if(!snap.exists()) return;
      const data = snap.data();
      if(!data.empresas || !data.empresas.length) return;
      if((data.updated||0) <= (window._lastKnownUpdated||0)) return; // eco do próprio salvamento, ou desatualizado
      window._lastKnownUpdated = data.updated;
      if(window._applyRemoteState) window._applyRemoteState(data.empresas);
    }, err => console.error('Falha no listener de sincronização (Aquisições):', err));
  });
</script>

<style>
  :root{
    --bg:#0d0620; --bg-panel:#1a0f2e; --bg-panel-2:#221540; --bg-inset:#170c28;
    --border:#3a2160; --border-soft:#2c1850;
    --accent:#00d4c8; --accent-dim:#0d3a36;
    --amber:#fbbf24; --amber-dim:#4a3a13;
    --good:#34d399; --good-dim:#123a2c;
    --bad:#fb7185; --bad-dim:#3f1622;
    --text:#f1eefa; --text-dim:#a99bc4; --text-faint:#6f5f92;
    --purple:#6a00b8; --magenta:#b91cd0;
    --radius:10px;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --disp:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--text); font-family:var(--body); font-size:14px; line-height:1.5;
    background-image:
      radial-gradient(ellipse 900px 500px at 12% -10%, rgba(0,212,200,.09), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(185,28,208,.08), transparent 60%);
    background-attachment:fixed;
  }
  ::selection{ background:var(--accent); color:#03110f; }
  button, input, select{ font-family:inherit; }

  /* ---------- topbar ---------- */
  .topbar{ position:sticky; top:0; z-index:50; backdrop-filter:blur(10px); background:rgba(13,6,32,.9); border-bottom:1px solid var(--border-soft); }
  .topbar-inner{ max-width:1560px; margin:0 auto; padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .brand{ display:flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:600; font-size:14.5px; white-space:nowrap; }
  .brand-dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px 2px rgba(0,212,200,.7); }
  .topbar-actions{ margin-left:auto; display:flex; align-items:center; gap:8px; }
  .ghost-btn{ background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:7px 13px; border-radius:7px; font-size:12px; cursor:pointer; white-space:nowrap; }
  .ghost-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .status-pill{ display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); font-family:var(--mono); font-size:12px; white-space:nowrap; }
  .status-pill b{ font-family:var(--body); font-weight:600;}
  .dot{width:7px;height:7px;border-radius:50%;}
  #fileImport{ display:none; }
  @media (max-width:760px){
    .topbar-inner{ flex-wrap:wrap; row-gap:8px; }
    .topbar-actions{ order:3; width:100%; justify-content:flex-start; flex-wrap:wrap; margin-left:0; }
  }

  /* ---------- shell layout ---------- */
  .shell{ max-width:1560px; margin:0 auto; display:flex; align-items:flex-start; }
  .sidebar{
    width:280px; flex-shrink:0; padding:20px 14px 40px; position:sticky; top:53px;
    height:calc(100vh - 53px); overflow-y:auto; border-right:1px solid var(--border-soft);
  }
  .sidebar h4{ font-family:var(--disp); font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-faint); margin:4px 6px 12px; }
  .new-provider-btn{
    width:100%; background:linear-gradient(180deg, rgba(0,212,200,.14), rgba(0,212,200,.05)); border:1px dashed rgba(0,212,200,.45);
    color:var(--accent); padding:11px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; margin-bottom:16px;
  }
  .new-provider-btn:hover{ background:rgba(0,212,200,.18); }
  .side-btn-row{ display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
  .side-btn{
    width:100%; background:var(--bg-inset); border:1px solid var(--border-soft); color:var(--text-dim);
    padding:8px 10px; border-radius:7px; font-size:11.5px; cursor:pointer; text-align:left;
  }
  .side-btn:hover{ border-color:var(--border); color:var(--text); }
  #sheetImport{ display:none; }
  .provider-list{ display:flex; flex-direction:column; gap:8px; }
  .provider-card{
    background:var(--bg-panel); border:1px solid var(--border-soft); border-radius:9px; padding:11px 12px; cursor:pointer; position:relative; transition:.15s;
  }
  .provider-card:hover{ border-color:var(--border); }
  .provider-card.active{ border-color:var(--accent); background:linear-gradient(180deg, rgba(0,212,200,.09), var(--bg-panel) 70%); }
  .provider-card .pname{ font-weight:600; font-size:13px; margin-bottom:3px; padding-right:20px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .provider-card .pmeta{ color:var(--text-faint); font-size:11px; font-family:var(--mono); display:flex; justify-content:space-between; gap:6px; }
  .provider-card .pstatus-chip{
    display:inline-block; margin-top:8px; font-family:var(--mono); font-size:10px; font-weight:600;
    padding:3px 9px; border-radius:12px; border:1px solid; white-space:nowrap;
  }
  .provider-card .pbadge{ position:absolute; top:11px; right:10px; width:8px; height:8px; border-radius:50%; }
  .provider-card .pactions{ display:flex; gap:6px; margin-top:8px; }
  .provider-card .pactions button{
    background:transparent; border:1px solid var(--border-soft); color:var(--text-faint); font-size:10.5px; padding:3px 7px; border-radius:5px; cursor:pointer;
  }
  .provider-card .pactions button:hover{ color:var(--text); border-color:var(--text-dim); }
  .empty-side{ color:var(--text-faint); font-size:12px; padding:14px 6px; line-height:1.6; }

  @media (max-width:940px){
    .shell{ flex-direction:column; align-items:stretch; }
    .sidebar{ width:100%; height:auto; position:static; border-right:none; border-bottom:1px solid var(--border-soft); }
    .provider-list{ flex-direction:row; overflow-x:auto; padding-bottom:6px; }
    .provider-card{ min-width:190px; flex-shrink:0; }
  }

  .main{ flex:1; min-width:0; padding:26px 28px 90px; }

  /* ---------- provider header ---------- */
  .phead{ margin-bottom:6px; }
  .phead .eyebrow{ font-family:var(--mono); color:var(--accent); font-size:11.5px; letter-spacing:.12em; text-transform:uppercase; margin:0 0 8px; }
  .phead-row{ display:flex; align-items:flex-end; gap:14px; flex-wrap:wrap; margin-bottom:18px; }
  .phead input.pname-input{
    background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text); font-family:var(--disp);
    font-weight:700; font-size:clamp(22px,3vw,30px); padding:2px 0; min-width:220px;
  }
  .phead input.pname-input:hover, .phead input.pname-input:focus{ border-bottom-color:var(--border); outline:none; }
  .status-select-wrap{ margin-top:9px; }
  .status-row{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  select.status-select{
    appearance:none; -webkit-appearance:none; border:1px solid var(--border); border-radius:20px;
    padding:6px 30px 6px 13px; font-family:var(--mono); font-size:11.5px; font-weight:600; cursor:pointer;
    background-color:var(--status-bg, var(--bg-inset)); color:var(--status-fg, var(--text-dim));
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%23a99bc4'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center;
  }
  select.status-select:focus{ outline:none; box-shadow:0 0 0 3px rgba(0,212,200,.18); }
  .motivo-toggle{
    display:none; align-items:center; gap:6px; border:1px solid var(--border); border-radius:20px;
    padding:6px 13px; font-family:var(--mono); font-size:11.5px; font-weight:600; cursor:pointer;
    background:var(--bg-inset); color:var(--text-dim);
  }
  .motivo-toggle:hover{ color:var(--text); border-color:#fb7185; }
  .motivo-toggle.filled{ color:#fb7185; border-color:#fb718555; background:#fb71851a; }
  .motivo-toggle .dot{ width:6px; height:6px; border-radius:50%; background:#fb7185; display:none; }
  .motivo-toggle.filled .dot{ display:inline-block; }
  .motivo-textarea{
    display:none; width:100%; max-width:520px; margin-top:8px; background:var(--bg-inset);
    border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text);
    font-family:inherit; font-size:12.5px; min-height:64px; resize:vertical;
  }
  .motivo-textarea:focus{ outline:none; border-color:#fb7185; }
  .phead-kpis{ display:flex; gap:22px; margin-left:auto; flex-wrap:wrap; max-width:100%; }
  .phead-kpis .k{ text-align:right; }
  .phead-kpis .k .l{ font-size:10px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; }
  .phead-kpis .k .v{ font-family:var(--mono); font-weight:600; font-size:15.5px; }
  @media (max-width:600px){
    .phead-row{ display:block; }
    .pname-input{ display:block; width:100%; }
    .phead-kpis{ margin-left:0; margin-top:16px; justify-content:flex-start; }
  }

  /* ---------- tabs ---------- */
  .tabbar{ display:flex; gap:2px; border-bottom:1px solid var(--border-soft); margin-bottom:24px; overflow-x:auto; }
  .tabbar button{
    background:transparent; border:none; color:var(--text-dim); padding:11px 16px; font-family:var(--disp); font-weight:600;
    font-size:13px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
  }
  .tabbar button:hover{ color:var(--text); }
  .tabbar button.active{ color:var(--accent); border-bottom-color:var(--accent); }
  .tabpanel{ display:none; }
  .tabpanel.active{ display:block; }

  /* ---------- shared panels/fields/tables (from single-provider dashboard) ---------- */
  .panel{ background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:20px; min-width:0; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; min-width:0; }
  .grid2 > *{ min-width:0; }
  @media (max-width:920px){ .grid2{ grid-template-columns:1fr; } }
  .sec-block{ margin-bottom:26px; }
  .sec-block > h3{ font-family:var(--disp); font-size:14.5px; font-weight:600; margin:0 0 12px; color:var(--text-dim); }
  .sec-block > p.hint{ color:var(--text-faint); font-size:12px; margin:-6px 0 14px; }

  .field{ display:flex; flex-direction:column; gap:5px; }
  .field label{ font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.06em; }
  .field input, .field select{
    background:var(--bg-inset); border:1px solid var(--border); color:var(--text); font-family:var(--mono);
    font-size:13.5px; padding:9px 10px; border-radius:7px; width:100%;
  }
  .field input:focus, .field select:focus, table input:focus, table select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,212,200,.15); }
  .field-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; }
  .field .money{ position:relative; }
  .field .money .prefix{ position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-faint); font-family:var(--mono); font-size:13.5px; pointer-events:none; }
  .field .money input{ padding-left:30px; }

  .kpi-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .kpi{ background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:15px 17px; }
  .kpi .label{ color:var(--text-faint); font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; margin-bottom:7px; }
  .kpi .value{ font-family:var(--mono); font-weight:600; font-size:19px; }
  .kpi .sub{ color:var(--text-dim); font-size:11px; margin-top:4px; }
  .kpi.hi{ border-color:rgba(0,212,200,.4); background:linear-gradient(180deg, rgba(0,212,200,.08), var(--bg-panel) 60%); }
  .kpi.hi .value{ color:var(--accent); font-size:22px; }

  .table-scroll{ overflow-x:auto; border-radius:8px; border:1px solid var(--border-soft); }
  table{ width:100%; border-collapse:collapse; min-width:640px; }
  thead th{ background:var(--bg-panel-2); color:var(--text-faint); text-transform:uppercase; letter-spacing:.05em; font-size:10.5px; font-weight:600; text-align:right; padding:10px; white-space:nowrap; border-bottom:1px solid var(--border); }
  thead th:first-child, thead th:nth-child(2){ text-align:left; }
  tbody td{ padding:6px 8px; border-bottom:1px solid var(--border-soft); text-align:right; white-space:nowrap; }
  tbody td:first-child, tbody td:nth-child(2){ text-align:left; }
  tbody tr:hover{ background:rgba(255,255,255,.02); }
  table input, table select{ background:var(--bg-inset); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:12.5px; padding:7px 8px; border-radius:6px; width:100%; min-width:70px; text-align:right; }
  table td:first-child input, table td:nth-child(2) input, table select{ text-align:left; font-family:var(--body); }
  tfoot td{ padding:11px 8px; font-weight:600; border-top:1px solid var(--border); background:var(--bg-panel-2); font-family:var(--mono); }
  .computed{ color:var(--text-dim); font-family:var(--mono); }
  .rm-btn{ background:transparent; border:1px solid var(--border); color:var(--text-faint); width:26px; height:26px; border-radius:6px; cursor:pointer; font-size:14px; line-height:1; }
  .rm-btn:hover{ border-color:var(--bad); color:var(--bad); }

  /* Tabela de propostas: muitas colunas — compacta pra caber sem scroll horizontal */
  #tbl-propostas{ min-width:0; }
  #tbl-propostas th, #tbl-propostas td{ padding:5px 3px; }
  #tbl-propostas th{ font-size:9px; }
  #tbl-propostas td.computed{ font-size:11px; }
  #tbl-propostas input, #tbl-propostas select{ font-size:10.5px; padding:5px 4px; min-width:0; }
  #tbl-propostas td:nth-child(1) input{ min-width:52px; }
  #tbl-propostas td:nth-child(2) input{ min-width:72px; }
  #tbl-propostas td:nth-child(3) input, #tbl-propostas td:nth-child(6) input{ width:38px; min-width:0; text-align:center; }
  #tbl-propostas .badge{ padding:3px 6px; font-size:9.5px; }
  #tbl-propostas .rm-btn{ width:20px; height:20px; font-size:11px; }
  .add-row{ margin-top:10px; background:var(--bg-inset); border:1px dashed var(--border); color:var(--text-dim); padding:9px 14px; border-radius:7px; font-size:12.5px; cursor:pointer; }
  .add-row:hover{ border-color:var(--accent); color:var(--accent); }

  .chart-wrap{ display:flex; align-items:flex-end; gap:34px; height:220px; padding:10px 6px 0; }
  .chart-group{ display:flex; flex-direction:column; align-items:center; gap:8px; flex:1; height:100%; justify-content:flex-end; }
  .chart-bars{ display:flex; gap:8px; align-items:flex-end; height:100%; }
  .bar{ width:34px; border-radius:5px 5px 0 0; position:relative; }
  .bar .tag{ position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:10.5px; color:var(--text-dim); white-space:nowrap; }
  .bar.a{ background:linear-gradient(180deg,var(--purple),var(--magenta)); }
  .bar.b{ background:linear-gradient(180deg,var(--accent),#009088); }
  .chart-group .glabel{ font-size:11.5px; color:var(--text-dim); }
  .legend{ display:flex; gap:18px; justify-content:center; margin-top:14px; font-size:11.5px; color:var(--text-dim);}
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend i{ width:10px; height:10px; border-radius:3px; display:inline-block; }

  .badge{ font-family:var(--mono); font-size:11.5px; font-weight:600; padding:4px 10px; border-radius:20px; display:inline-block; }
  .badge.sim{ background:var(--good-dim); color:var(--good); border:1px solid rgba(52,211,153,.35); }
  .badge.nao{ background:var(--bad-dim); color:var(--bad); border:1px solid rgba(251,113,133,.35); }
  .badge.rev{ background:var(--amber-dim); color:var(--amber); border:1px solid rgba(251,191,36,.35); }

  .check-list{ display:flex; flex-direction:column; gap:10px; }
  .check{ display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--bg-inset); border:1px solid var(--border-soft); border-radius:8px; padding:12px 15px; }
  .check .ctext{ font-size:13px; }
  .check .cmeta{ color:var(--text-faint); font-size:11.5px; font-family:var(--mono); }

  .gauge{ position:relative; height:64px; margin-top:22px; }
  .gauge-track{ position:absolute; top:26px; left:0; right:0; height:10px; border-radius:6px; background:var(--bg-inset); border:1px solid var(--border-soft); overflow:hidden; }
  .gauge-zone{ position:absolute; top:0; bottom:0; }
  .gauge-mark{ position:absolute; top:6px; width:2px; height:26px; background:var(--text); }
  .gauge-mark .mlabel{ position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:10px; white-space:nowrap; }
  .gauge-mark .mval{ position:absolute; top:32px; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:10px; color:var(--text-dim); white-space:nowrap; }
  .gauge-mark.prop{ background:var(--amber); } .gauge-mark.prop .mlabel{ color:var(--amber); }
  .gauge-mark.sug{ background:var(--accent); z-index:3;} .gauge-mark.sug .mlabel{ color:var(--accent); }

  .note{ font-size:11.5px; color:var(--text-faint); margin-top:10px; line-height:1.6; }

/* ======================================================================
   CÁLCULO DE EMPRÉSTIMO (memória de cálculo — carência + SAC trimestral +
   comissão flat + IR sobre juros, igual à planilha de reestruturação)
====================================================================== */
function calcEmprestimo(p, investTotal){
  const valor = p.finValorOverride!=null ? p.finValorOverride : investTotal;
  const carencia = Math.max(0, Math.round(p.finCarenciaTri||0));
  const parcelasAmort = Math.max(1, Math.round(p.finParcelasTri||1));
  const taxaTri = (p.finSelic||0)/4/100; // Selic a.a. ÷ 4 trimestres, taxa simples
  const flatPct = (p.finFlatPct||0)/100;
  const irPct = (p.finIRPct||0)/100;
  const principalPorParcela = valor/parcelasAmort;

  const linhas = [];
  const flatValor = valor*flatPct;
  linhas.push({ parcela:0, dia:0, saldo:valor, principal:0, juros:0, flat:flatValor,
    semImposto: valor-flatValor, ir:0, comImposto: valor-flatValor, mensalEquiv:null });

  let saldo = valor;
  const totalPeriodos = carencia+parcelasAmort;
  for(let k=1;k<=totalPeriodos;k++){
    const juros = saldo*taxaTri;
    const principal = k>carencia ? principalPorParcela : 0;
    const semImposto = juros+principal;
    const ir = juros*irPct;
    const comImposto = semImposto+ir;
    linhas.push({ parcela:k, dia:k*90, saldo, principal, juros, flat:0,
      semImposto, ir, comImposto, mensalEquiv: comImposto/3 });
    saldo -= principal;
  }

  const somaPrincipal = valor;
  const somaJuros = linhas.reduce((s,l)=>s+l.juros,0);
  const somaIR = linhas.reduce((s,l)=>s+l.ir,0);
  const custoTotalEmprestimo = somaJuros+somaIR+flatValor;
  const totalDesembolsado = somaPrincipal+somaJuros+somaIR;

  const ano1 = linhas.filter(l=>l.parcela>=1&&l.parcela<=4).reduce((s,l)=>s+l.comImposto,0);
  const reservaMensalAno1 = ano1/12;

  return { valor, carencia, parcelasAmort, taxaTri, flatValor, linhas,
    somaPrincipal, somaJuros, somaIR, custoTotalEmprestimo, totalDesembolsado, reservaMensalAno1 };
}

/* ======================================================================
   COMPUTED MODEL (per provider)
====================================================================== */
function compute(p){
  const custoAtualTotal = sumRows(p.custosAtual);
  const custoCompradorTotal = sumRows(p.custosComprador);
  const mrr = p.mrr||0;
  const deducoes = mrr*(p.impostosPct/100||0) + mrr*(p.pddPct/100||0);
  const ebitdaAtual = mrr - deducoes - custoAtualTotal;
  const ebitdaComprador = mrr - deducoes - custoCompradorTotal;
  const margemAtual = mrr? ebitdaAtual/mrr : 0;
  const margemComprador = mrr? ebitdaComprador/mrr : 0;
  const custoClienteAtual = p.clientes? custoAtualTotal/p.clientes : 0;
  const custoClienteComprador = p.clientes? custoCompradorTotal/p.clientes : 0;

  const tetoMRR = mrr*(p.multMRR||0);
  const tetoEBITDA = ebitdaComprador>0 ? ebitdaComprador*12*(p.multEBITDA||0) : 0;
  const tetoSustentavel = ebitdaComprador>0 ? ebitdaComprador*(p.metaPayback||0) : 0;
  const propostaSugerida = { nome:"Proposta Sugerida*", valor: Math.round(tetoSustentavel/1000)*1000,
    entrada: p.propostaSugEntrada!=null?p.propostaSugEntrada:50, parcelas: p.propostaSugParcelas!=null?p.propostaSugParcelas:12 };

  // Linhas de investimento vinculadas a uma proposta (real ou a Proposta
  // Sugerida*) puxam o valor de entrada (R$) automaticamente, sempre que mudar.
  p.investimentos.forEach(r=>{
    if(!r.propostaLink) return;
    const pr = r.propostaLink==='sug' ? propostaSugerida : p.propostas.find(x=>x.id===r.propostaLink);
    if(pr) r.valor = pr.valor*(pr.entrada/100||0);
  });

  const investTotal = sumRows(p.investimentos);
  const invPorCliente = p.clientes? investTotal/p.clientes : 0;
  const invPctMRRano = mrr? investTotal/(mrr*12) : 0;
  const payback = ebitdaComprador>0 ? investTotal/ebitdaComprador : Infinity;
  const evMRR = mrr? investTotal/mrr : 0;
  const evEBITDAano = ebitdaComprador>0 ? investTotal/(ebitdaComprador*12) : Infinity;

  const ebitdaPositivo = ebitdaComprador>0;
  const margemOk = margemComprador >= (p.metaMargem/100||0);
  const paybackOk = isFinite(payback) && payback<=(p.metaPayback||0);
  const conclusao = (ebitdaPositivo && margemOk && paybackOk) ? "SIM" : "REVISAR";

  const emprestimo = calcEmprestimo(p, investTotal);
  emprestimo.caixaPosReserva = ebitdaComprador - emprestimo.reservaMensalAno1;

  return { custoAtualTotal, custoCompradorTotal, investTotal, mrr, deducoes,
    ebitdaAtual, ebitdaComprador, margemAtual, margemComprador, custoClienteAtual, custoClienteComprador,
    invPorCliente, invPctMRRano, payback, evMRR, evEBITDAano, tetoMRR, tetoEBITDA, tetoSustentavel, propostaSugerida,
    ebitdaPositivo, margemOk, paybackOk, conclusao, emprestimo };
}

function proposalCalc(pr, p, m){
  const entradaR = pr.valor*(pr.entrada/100);
  const saldoFin = pr.valor-entradaR;
  const parcela = pr.parcelas? saldoFin/pr.parcelas : 0;
  const porCliente = p.clientes? pr.valor/p.clientes : 0;
  const evMRRi = m.mrr? pr.valor/m.mrr : 0;
  const evEBITDAi = m.ebitdaComprador>0 ? pr.valor/(m.ebitdaComprador*12) : Infinity;
  const paybackI = m.ebitdaComprador>0 ? pr.valor/m.ebitdaComprador : Infinity;
  const caixaMensal = m.ebitdaComprador - parcela;
  let viavel;
  if(caixaMensal<=0) viavel="NÃO";
  else if(isFinite(paybackI) && paybackI<=(p.metaPayback||0)) viavel="SIM";
  else viavel="REVISAR";
  return {entradaR, saldoFin, parcela, porCliente, evMRRi, evEBITDAi, paybackI, caixaMensal, viavel};
}

function renderSidebar(){
  const list = document.getElementById('providerList');
  if(!app.empresas.length){
    list.innerHTML = `<div class="empty-side">Nenhum provedor cadastrado ainda. Clique em <b>+ Novo provedor</b> para começar.</div>`;
    return;
  }
  list.innerHTML = app.empresas.map(p=>{
    const m = compute(p);
    const active = p.id===app.currentId;
    const badgeColor = m.conclusao==='SIM' ? 'var(--good)' : 'var(--amber)';
    const stColor = STATUS_COLOR[p.status] || '#8b99b6';
    return `<div class="provider-card ${active?'active':''}" data-id="${p.id}">
      <span class="pbadge" style="background:${badgeColor}" title="Conclusão financeira: ${m.conclusao}"></span>
      <div class="pname">${esc(p.nome)||'(sem nome)'}</div>
      <div class="pmeta"><span>${esc(p.regiao)||'—'}</span><span>${fmtBRL(p.mrr)}/mês</span></div>
      <div class="pstatus-chip" style="color:${stColor};border-color:${stColor}55;background:${stColor}1a;">${esc(p.status||'Prospecção')}</div>
      <div class="pactions">
        <button data-act="dup" title="Duplicar">Duplicar</button>
        <button data-act="del" title="Remover">Remover</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.provider-card').forEach(card=>{
    card.addEventListener('click', e=>{
      if(e.target.dataset.act) return;
      app.currentId = card.dataset.id; saveApp(); renderAll();
    });
    card.querySelector('[data-act="dup"]').addEventListener('click', e=>{
      e.stopPropagation();
      const src = app.empresas.find(x=>x.id===card.dataset.id);
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = 'e_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
      copy.nome = src.nome + ' (cópia)';
      app.empresas.push(copy); app.currentId = copy.id; saveApp(); renderAll();
    });
    card.querySelector('[data-act="del"]').addEventListener('click', e=>{
      e.stopPropagation();
      const src = app.empresas.find(x=>x.id===card.dataset.id);
      if(!confirm(`Remover "${src.nome}"? Essa ação não pode ser desfeita.`)) return;
      app.empresas = app.empresas.filter(x=>x.id!==card.dataset.id);
      if(app.currentId===card.dataset.id) app.currentId = app.empresas[0]?.id || null;
      saveApp(); renderAll();
    });
  });
}

document.getElementById('newProviderBtn').onclick = () => {
  const p = blankEmpresa("Novo provedor "+(app.empresas.length+1));
  app.empresas.push(p); app.currentId = p.id; saveApp(); renderAll();

};

/* ======================================================================
   RENDER: cost / invest / proposals tables (rebuilt on structural change)
====================================================================== */
function catOptions(sel){ return ["DP","DO","DI","DF","Outro"].map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join(''); }
function tipoOptions(sel){ return ["Compra","One-off","Capex","Capital de giro"].map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join(''); }

function buildCostTable(key, tableId){
  const p = current();
  const tbody = document.querySelector('#'+tableId+' tbody');
  if(!tbody) return;
  tbody.innerHTML = p[key].map((r,i)=>`
    <tr data-i="${i}">
      <td><select data-role="cat">${catOptions(r.cat)}</select></td>
      <td><input data-role="item" type="text" value="${esc(r.item)}"></td>
      <td><input data-role="qtd" type="number" step="0.01" value="${r.qtd}"></td>
      <td><input data-role="valor" type="number" step="0.01" value="${r.valor}"></td>
      <td class="computed" data-role="total">${fmtBRL2(rowTotal(r))}</td>
      <td><button class="rm-btn" data-role="rm">×</button></td>
    </tr>`).join('');
  tbody.oninput = e => {
    const tr = e.target.closest('tr'); if(!tr) return;
    const i = +tr.dataset.i; const role = e.target.dataset.role;
    const row = current()[key][i];
    if(role==='item') row.item = e.target.value;
    else if(role==='qtd') row.qtd = parseFloat(e.target.value)||0;
    else if(role==='valor') row.valor = parseFloat(e.target.value)||0;
    else if(role==='cat') row.cat = e.target.value;
    tr.querySelector('[data-role="total"]').textContent = fmtBRL2(rowTotal(row));
    recomputeAll(); saveApp();
  };
  tbody.onclick = e => {
    if(e.target.dataset.role!=='rm') return;
    const tr = e.target.closest('tr'); const i = +tr.dataset.i;
    current()[key].splice(i,1);
    buildCostTable(key, tableId); recomputeAll(); saveApp(); renderSidebar();
  };
}

function buildInvestTable(){
  const p = current();
  const m = compute(p); // sincroniza r.valor das linhas vinculadas a uma proposta antes de renderizar
  const tbody = document.querySelector('#tbl-invest tbody');
  if(!tbody) return;
  tbody.innerHTML = p.investimentos.map((r,i)=>{
    const linked = r.propostaLink && (r.propostaLink==='sug' || p.propostas.find(pr=>pr.id===r.propostaLink));
    const propostaOptions = `<option value="">— manual —</option>` +
      p.propostas.map(pr=>`<option value="${pr.id}" ${r.propostaLink===pr.id?'selected':''}>${esc(pr.nome)} (Entrada)</option>`).join('') +
      `<option value="sug" ${r.propostaLink==='sug'?'selected':''}>${esc(m.propostaSugerida.nome)} (Entrada)</option>`;
    return `
    <tr data-i="${i}">
      <td><input data-role="cat" type="text" value="${esc(r.cat)}"></td>
      <td><input data-role="item" type="text" value="${esc(r.item)}"></td>
      <td><select data-role="tipo">${tipoOptions(r.tipo)}</select></td>
      <td><input data-role="qtd" type="number" step="0.01" value="${r.qtd}"></td>
      <td><input data-role="valor" type="number" step="0.01" value="${r.valor}" ${linked?'disabled title="Vindo automaticamente da proposta vinculada"':''}></td>
      <td><select data-role="propostaLink">${propostaOptions}</select></td>
      <td class="computed" data-role="total">${fmtBRL2(rowTotal(r))}</td>
      <td><button class="rm-btn" data-role="rm">×</button></td>
    </tr>`;
  }).join('');
  tbody.oninput = e => {
    const tr = e.target.closest('tr'); if(!tr) return;
    const i = +tr.dataset.i; const role = e.target.dataset.role;
    const row = current().investimentos[i];
    if(role==='propostaLink'){
      row.propostaLink = e.target.value || null;
      recomputeAll(); saveApp(); buildInvestTable();
      return;
    }
    if(role==='item') row.item=e.target.value;
    else if(role==='cat') row.cat=e.target.value;
    else if(role==='tipo') row.tipo=e.target.value;
    else if(role==='qtd') row.qtd=parseFloat(e.target.value)||0;
    else if(role==='valor') row.valor=parseFloat(e.target.value)||0;
    tr.querySelector('[data-role="total"]').textContent = fmtBRL2(rowTotal(row));
    recomputeAll(); saveApp();
  };
  tbody.onclick = e => {
    if(e.target.dataset.role!=='rm') return;
    const tr=e.target.closest('tr'); const i=+tr.dataset.i;
    current().investimentos.splice(i,1);
    buildInvestTable(); recomputeAll(); saveApp(); renderSidebar();
  };
}

function refreshPropostaRowComputed(tr, pr){
  const p = current(); const m = compute(p);
  const c = proposalCalc(pr, p, m);
  tr.querySelector('[data-role="entradaR"]').textContent = fmtBRL(c.entradaR);
  tr.querySelector('[data-role="saldoFin"]').textContent = fmtBRL(c.saldoFin);
  tr.querySelector('[data-role="parcela"]').textContent = fmtBRL(c.parcela);
  tr.querySelector('[data-role="porCliente"]').textContent = fmtBRL2(c.porCliente);
  tr.querySelector('[data-role="evMRRi"]').textContent = fmtMult(c.evMRRi);
  tr.querySelector('[data-role="evEBITDAi"]').textContent = fmtMult(c.evEBITDAi);
  tr.querySelector('[data-role="paybackI"]').textContent = isFinite(c.paybackI)?c.paybackI.toFixed(1):'N/A';
  tr.querySelector('[data-role="caixaMensal"]').textContent = fmtBRL(c.caixaMensal);
  const badge = tr.querySelector('[data-role="badge"]');
  if(badge){ badge.className = 'badge '+(c.viavel==='SIM'?'sim':(c.viavel==='NÃO'?'nao':'rev')); badge.textContent = c.viavel; }
}
function buildPropostasTable(){
  const p = current();
  p.propostas.forEach(pr=>{ if(!pr.id) pr.id = novoId('pr'); }); // propostas antigas sem id (compat.)
  const tbody = document.getElementById('propostas-body');
  if(!tbody) return;
  const m = compute(p);
  let rows = p.propostas.map((pr,i)=>{
    const c = proposalCalc(pr,p,m);
    const cls = c.viavel==='SIM'?'sim':(c.viavel==='NÃO'?'nao':'rev');
    return `<tr data-i="${i}">
      <td><input data-role="nome" type="text" value="${esc(pr.nome)}"></td>
      <td><input data-role="valor" type="text" inputmode="numeric" value="${fmtMoneyInput(pr.valor)}"></td>
      <td><input data-role="entrada" type="number" step="1" value="${pr.entrada}"></td>
      <td class="computed" data-role="entradaR">${fmtBRL(c.entradaR)}</td>
      <td class="computed" data-role="saldoFin">${fmtBRL(c.saldoFin)}</td>
      <td><input data-role="parcelas" type="number" step="1" value="${pr.parcelas}"></td>
      <td class="computed" data-role="parcela">${fmtBRL(c.parcela)}</td>
      <td class="computed" data-role="porCliente">${fmtBRL2(c.porCliente)}</td>
      <td class="computed" data-role="evMRRi">${fmtMult(c.evMRRi)}</td>
      <td class="computed" data-role="evEBITDAi">${fmtMult(c.evEBITDAi)}</td>
      <td class="computed" data-role="paybackI">${isFinite(c.paybackI)?c.paybackI.toFixed(1):'N/A'}</td>
      <td class="computed" data-role="caixaMensal">${fmtBRL(c.caixaMensal)}</td>
      <td><span class="badge ${cls}" data-role="badge">${c.viavel}</span></td>
      <td><button class="rm-btn" data-role="rm">×</button></td>
    </tr>`;
  }).join('');

  const sug = m.propostaSugerida;
  const cs = proposalCalc(sug,p,m);
  const clsS = cs.viavel==='SIM'?'sim':(cs.viavel==='NÃO'?'nao':'rev');
  rows += `<tr data-i="sug" style="background:rgba(0,212,200,.06);">
      <td><em>${esc(sug.nome)}</em></td>
      <td class="computed" style="color:var(--accent);font-weight:600;">${fmtBRL(sug.valor)}</td>
      <td><input data-role="entrada" type="number" step="1" value="${sug.entrada}"></td>
      <td class="computed" data-role="entradaR">${fmtBRL(cs.entradaR)}</td>
      <td class="computed" data-role="saldoFin">${fmtBRL(cs.saldoFin)}</td>
      <td><input data-role="parcelas" type="number" step="1" value="${sug.parcelas}"></td>
      <td class="computed" data-role="parcela">${fmtBRL(cs.parcela)}</td>
      <td class="computed" data-role="porCliente">${fmtBRL2(cs.porCliente)}</td>
      <td class="computed" data-role="evMRRi">${fmtMult(cs.evMRRi)}</td>
      <td class="computed" data-role="evEBITDAi">${fmtMult(cs.evEBITDAi)}</td>
      <td class="computed" data-role="paybackI">${isFinite(cs.paybackI)?cs.paybackI.toFixed(1):'N/A'}</td>
      <td class="computed" data-role="caixaMensal">${fmtBRL(cs.caixaMensal)}</td>
      <td><span class="badge ${clsS}" data-role="badge">${cs.viavel}</span></td>
      <td></td>
    </tr>`;
  tbody.innerHTML = rows;

  tbody.oninput = e => {
    const tr = e.target.closest('tr'); if(!tr) return;
    const role = e.target.dataset.role;
    const p2 = current();
    if(tr.dataset.i==='sug'){
      if(role==='entrada') p2.propostaSugEntrada = parseFloat(e.target.value)||0;
      else if(role==='parcelas') p2.propostaSugParcelas = parseFloat(e.target.value)||1;
      else return;
      recomputeAll(); saveApp();
      refreshPropostaRowComputed(tr, compute(p2).propostaSugerida);
      return;
    }
    const i = +tr.dataset.i; const row = p2.propostas[i];
    if(role==='nome'){ row.nome=e.target.value; return; }
    else if(role==='valor'){
      const digitsBeforeCursor = e.target.value.slice(0, e.target.selectionStart).replace(/\D/g,'').length;
      const raw = parseMoneyInput(e.target.value);
      e.target.value = fmtMoneyInput(raw);
      let pos=0, digits=0;
      while(pos<e.target.value.length && digits<digitsBeforeCursor){ if(/\d/.test(e.target.value[pos])) digits++; pos++; }
      e.target.setSelectionRange(pos,pos);
      row.valor = raw;
    }
    else if(role==='entrada') row.entrada=parseFloat(e.target.value)||0;
    else if(role==='parcelas') row.parcelas=parseFloat(e.target.value)||1;
    recomputeAll(); saveApp();
    refreshPropostaRowComputed(tr, row);
  };
  tbody.onclick = e => {
    if(e.target.dataset.role!=='rm') return;
    const tr = e.target.closest('tr'); if(tr.dataset.i==='sug') return;
    current().propostas.splice(+tr.dataset.i,1);
    buildPropostasTable(); recomputeAll(); saveApp();
  };
}

====================================================================== */
function recomputeAll(){
  const p = current(); if(!p) return;
  const m = compute(p);
  const ticket = p.clientes? p.mrr/p.clientes : 0;

  const kpiRow = document.getElementById('pheadKpis');
  if(kpiRow) kpiRow.innerHTML = `
    <div class="k"><div class="l">Clientes</div><div class="v">${fmtNum(p.clientes)}</div></div>
    <div class="k"><div class="l">MRR</div><div class="v">${fmtBRL(p.mrr)}</div></div>
    <div class="k"><div class="l">Ticket médio</div><div class="v">${fmtBRL2(ticket)}</div></div>
    <div class="k"><div class="l">Oferta sustentável</div><div class="v" style="color:var(--accent)">${fmtBRL(m.tetoSustentavel)}</div></div>
  `;

  setText('atual-total-geral', fmtBRL2(m.custoAtualTotal));
  setText('comprador-total-geral', fmtBRL2(m.custoCompradorTotal));
  setText('invest-total-geral', fmtBRL2(m.investTotal));

  const deltaCusto = m.custoCompradorTotal-m.custoAtualTotal;
  const compKpi = document.getElementById('comparativoKpis');
  if(compKpi) compKpi.innerHTML = `
    <div class="kpi"><div class="label">Custo % receita (atual)</div><div class="value">${fmtPct(m.mrr?m.custoAtualTotal/m.mrr:0)}</div></div>
    <div class="kpi"><div class="label">Custo % receita (comprador)</div><div class="value">${fmtPct(m.mrr?m.custoCompradorTotal/m.mrr:0)}</div></div>
    <div class="kpi"><div class="label">EBITDA atual</div><div class="value">${fmtBRL(m.ebitdaAtual)}</div><div class="sub">margem ${fmtPct(m.margemAtual)}</div></div>
    <div class="kpi"><div class="label">EBITDA comprador</div><div class="value">${fmtBRL(m.ebitdaComprador)}</div><div class="sub">margem ${fmtPct(m.margemComprador)}</div></div>
    <div class="kpi"><div class="label">Variação de custo</div><div class="value" style="color:${deltaCusto>0?'var(--bad)':'var(--good)'}">${deltaCusto>0?'+':''}${fmtBRL2(deltaCusto)}</div></div>
    <div class="kpi"><div class="label">Custo / cliente (comprador)</div><div class="value">${fmtBRL2(m.custoClienteComprador)}</div></div>
  `;
  renderChart(m);

  setText('kpi-invcliente', fmtBRL2(m.invPorCliente));
  setText('kpi-invpct', fmtPct(m.invPctMRRano));
  setText('kpi-payback', isFinite(m.payback)?m.payback.toFixed(1):'N/A');
  setText('kpi-evmrr', fmtMult(m.evMRR));

  setText('kpi-tetomrr', fmtBRL(m.tetoMRR));
  setText('kpi-tetoebitda', fmtBRL(m.tetoEBITDA));
  setText('kpi-tetosustentavel', fmtBRL(m.tetoSustentavel));
  renderGauge(p, m);

  const checks = [
    {label:'EBITDA positivo', val:fmtBRL(m.ebitdaComprador), meta:'> R$ 0', ok:m.ebitdaPositivo},
    {label:'Margem EBITDA ≥ meta', val:fmtPct(m.margemComprador), meta:fmtPct(p.metaMargem/100||0), ok:m.margemOk},
    {label:'Payback ≤ meta', val:isFinite(m.payback)?m.payback.toFixed(1)+'m':'N/A', meta:(p.metaPayback||0)+'m', ok:m.paybackOk},
  ];
  const checkList = document.getElementById('checkList');
  if(checkList) checkList.innerHTML = checks.map(c=>`
    <div class="check"><div class="ctext">${c.label} <span class="cmeta">(${c.val} · meta ${c.meta})</span></div>
    <span class="badge ${c.ok?'sim':'nao'}">${c.ok?'SIM':'NÃO'}</span></div>`).join('') +
    `<div class="check"><div class="ctext"><b>Conclusão geral</b></div><span class="badge ${m.conclusao==='SIM'?'sim':'rev'}">${m.conclusao}</span></div>`;

  const dot = document.getElementById('statusDot'); const txt = document.getElementById('statusText');
  if(dot && txt){
    txt.textContent = m.conclusao;
    dot.style.background = m.conclusao==='SIM' ? 'var(--good)' : 'var(--amber)';
    dot.style.boxShadow = `0 0 8px 2px ${m.conclusao==='SIM' ? 'rgba(52,211,153,.6)':'rgba(251,191,36,.6)'}`;
  }

  const finValEl = document.getElementById('in-fin-valor');
  if(finValEl && document.activeElement!==finValEl) finValEl.value = fmtMoneyInput(m.emprestimo.valor);
  setText('kpi-fin-juros', fmtBRL(m.emprestimo.somaJuros));
  setText('kpi-fin-ir-total', fmtBRL(m.emprestimo.somaIR));
  setText('kpi-fin-flat', fmtBRL(m.emprestimo.flatValor));
  setText('kpi-fin-custo', fmtBRL(m.emprestimo.custoTotalEmprestimo));
  setText('kpi-fin-reserva', fmtBRL(m.emprestimo.reservaMensalAno1));
  setText('kpi-fin-caixa', fmtBRL(m.emprestimo.caixaPosReserva));
  buildEmprestimoTable(m.emprestimo);

  refreshProposalsComputed(p, m);
  renderSidebar();
}
function setText(id, val){ const el=document.getElementById(id); if(el) el.textContent = val; }

function refreshProposalsComputed(p, m){
  const tbody = document.getElementById('propostas-body'); if(!tbody) return;
  [...tbody.querySelectorAll('tr')].forEach(tr=>{
    const i = tr.dataset.i; let pr;
    if(i==='sug'){
      pr = {valor: Math.round(m.tetoSustentavel/1000)*1000, entrada: p.propostaSugEntrada!=null?p.propostaSugEntrada:50, parcelas: p.propostaSugParcelas!=null?p.propostaSugParcelas:12};
      const vEl = tr.querySelector('[data-role="valor"]'); if(vEl) vEl.textContent = fmtBRL(pr.valor);
    } else { pr = p.propostas[+i]; if(!pr) return; }
    const c = proposalCalc(pr,p,m);
    const set = (sel,val)=>{ const el=tr.querySelector(sel); if(el) el.textContent=val; };
    if(i!=='sug'){
      set('[data-role="entradaR"]', fmtBRL(c.entradaR));
      set('[data-role="saldoFin"]', fmtBRL(c.saldoFin));
      set('[data-role="parcela"]', fmtBRL(c.parcela));
      set('[data-role="porCliente"]', fmtBRL2(c.porCliente));
      set('[data-role="evMRRi"]', fmtMult(c.evMRRi));
      set('[data-role="evEBITDAi"]', fmtMult(c.evEBITDAi));
      set('[data-role="paybackI"]', isFinite(c.paybackI)?c.paybackI.toFixed(1):'N/A');
      set('[data-role="caixaMensal"]', fmtBRL(c.caixaMensal));
    } else {
      const tds = tr.querySelectorAll('td.computed');
      const vals = [fmtBRL(c.entradaR), fmtBRL(c.saldoFin), fmtBRL(c.parcela), fmtBRL2(c.porCliente), fmtMult(c.evMRRi), fmtMult(c.evEBITDAi), isFinite(c.paybackI)?c.paybackI.toFixed(1):'N/A', fmtBRL(c.caixaMensal)];
      tds.forEach((td,idx)=>{ if(idx>0 && vals[idx-1]!==undefined) td.textContent = vals[idx-1]; });
    }
    const cls = c.viavel==='SIM'?'sim':(c.viavel==='NÃO'?'nao':'rev');
    const badge = tr.querySelector('.badge');
    if(badge){ badge.className='badge '+cls; badge.textContent=c.viavel; }
  });
}

function renderChart(m){
  const maxVal = Math.max(m.custoAtualTotal, m.custoCompradorTotal, m.ebitdaAtual, m.ebitdaComprador, 1);
  const h = n => Math.max(4, (n/maxVal)*180);
  const groups = [
    {label:'Custos / mês', a:m.custoAtualTotal, b:m.custoCompradorTotal},
    {label:'EBITDA / mês', a:m.ebitdaAtual, b:m.ebitdaComprador},
  ];
  const el = document.getElementById('chart'); if(!el) return;
  el.innerHTML = groups.map(g=>`
    <div class="chart-group">
      <div class="chart-bars">
        <div class="bar a" style="height:${h(g.a)}px"><span class="tag">${fmtBRL(g.a)}</span></div>
        <div class="bar b" style="height:${h(g.b)}px"><span class="tag">${fmtBRL(g.b)}</span></div>
      </div>
      <div class="glabel">${g.label}</div>
    </div>`).join('');
}

function renderGauge(p, m){
  const el = document.getElementById('gauge'); if(!el) return;
  const propVals = p.propostas.map(pr=>pr.valor);
  const sugVal = Math.round(m.tetoSustentavel/1000)*1000;
  const allVals = [m.tetoMRR, m.tetoEBITDA, m.tetoSustentavel, sugVal, ...propVals, 1];
  const max = Math.max(...allVals)*1.08;
  const pct = v => Math.max(0,Math.min(100,(v/max)*100));
  let marks = [
    {v:m.tetoSustentavel, label:'Sustentável', cls:'sug'},
    {v:m.tetoMRR, label:'EV/MRR alvo', cls:''},
    {v:m.tetoEBITDA, label:'EV/EBITDA alvo', cls:''},
  ];
  p.propostas.forEach(pr=> marks.push({v:pr.valor, label:pr.nome, cls:'prop'}));
  const zones = `
    <div class="gauge-zone" style="left:0; width:${pct(m.tetoSustentavel)}%; background:rgba(52,211,153,.18);"></div>
    <div class="gauge-zone" style="left:${pct(m.tetoSustentavel)}%; width:${Math.max(0,pct(m.tetoMRR)-pct(m.tetoSustentavel))}%; background:rgba(251,191,36,.15);"></div>
    <div class="gauge-zone" style="left:${pct(m.tetoMRR)}%; width:${100-pct(m.tetoMRR)}%; background:rgba(251,113,133,.14);"></div>`;
  const markHtml = marks.map(mk=>`
    <div class="gauge-mark ${mk.cls}" style="left:${pct(mk.v)}%;">
      <span class="mlabel">${esc(mk.label)}</span><span class="mval">${fmtBRL(mk.v)}</span>
    </div>`).join('');
  el.innerHTML = `<div class="gauge-track">${zones}</div>${markHtml}`;
}

/* ======================================================================
   FIELD BINDING (identification / meta / financing)
====================================================================== */
function bindField(id, setter){
  const el = document.getElementById(id); if(!el) return;
  el.oninput = () => { setter(current(), el.value); recomputeAll(); saveApp(); };
}
function fmtMoneyInput(n){ return Math.round(n||0).toLocaleString('pt-BR'); }
function parseMoneyInput(v){ return parseInt(String(v||'').replace(/\D/g,''),10) || 0; }
function bindMoneyField(id, setter){
  const el = document.getElementById(id); if(!el) return;
  el.oninput = () => {
    const digitsBeforeCursor = el.value.slice(0, el.selectionStart).replace(/\D/g,'').length;
    const raw = parseMoneyInput(el.value);
    el.value = fmtMoneyInput(raw);
    let pos = 0, digits = 0;
    while(pos < el.value.length && digits < digitsBeforeCursor){ if(/\d/.test(el.value[pos])) digits++; pos++; }
    el.setSelectionRange(pos, pos);
    setter(current(), raw); recomputeAll(); saveApp();
  };
}
function fillFields(){
  const p = current(); if(!p) return;
  const set = (id,val)=>{ const el=document.getElementById(id); if(el) el.value = val; };
  set('pname', p.nome);
  set('in-comprador', p.comprador);
  set('in-regiao', p.regiao);
  set('in-data', p.data);
  set('in-clientes', p.clientes);
  set('in-mrr', fmtMoneyInput(p.mrr));
  set('in-impostos', p.impostosPct);
  set('in-pdd', p.pddPct);
  set('in-metamargem', p.metaMargem);
  set('in-metapayback', p.metaPayback);
  set('in-multmrr', p.multMRR);
  set('in-multebitda', p.multEBITDA);
  set('in-fin-selic', p.finSelic);
  set('in-fin-carencia', p.finCarenciaTri);
  set('in-fin-parcelas', p.finParcelasTri);
  set('in-fin-flat', p.finFlatPct);
  set('in-fin-ir', p.finIRPct);
  set('in-intencao-valor', fmtMoneyInput(p.intencaoVendaValor));
  set('pstatus', p.status||"Prospecção");
  set('in-motivo', p.motivoDescarte||"");
  const motivoTa = document.getElementById('in-motivo'); if(motivoTa) motivoTa.style.display = 'none';
  applyStatusColor();
  updateMotivoUI();
}
function applyStatusColor(){
  const sel = document.getElementById('pstatus'); if(!sel) return;
  const color = STATUS_COLOR[sel.value] || '#a99bc4';
  sel.style.setProperty('--status-bg', color+'22');
  sel.style.setProperty('--status-fg', color);
  sel.style.borderColor = color+'55';
}
function updateMotivoUI(){
  const p = current(); if(!p) return;
  const toggle = document.getElementById('motivoToggle');
  const sel = document.getElementById('pstatus');
  if(!toggle || !sel) return;
  const isDescartado = sel.value === 'Descartado';
  toggle.style.display = isDescartado ? 'inline-flex' : 'none';
  if(!isDescartado){ const ta = document.getElementById('in-motivo'); if(ta) ta.style.display = 'none'; }
  toggle.classList.toggle('filled', !!(p.motivoDescarte && p.motivoDescarte.trim()));
}
function bindAll(){
  bindField('pname', (p,v)=>{ p.nome=v; });
  document.getElementById('pstatus').onchange = e => {
    current().status = e.target.value;
    applyStatusColor();
    updateMotivoUI();
    if(e.target.value === 'Descartado'){
      const ta = document.getElementById('in-motivo');
      ta.style.display = 'block';
      ta.focus();
    }
    saveApp(); renderSidebar();
  };
  bindField('in-motivo', (p,v)=>p.motivoDescarte=v);
  document.getElementById('in-motivo').addEventListener('input', updateMotivoUI);
  document.getElementById('motivoToggle').onclick = () => {
    const ta = document.getElementById('in-motivo');

    ta.style.display = opening ? 'block' : 'none';
    if(opening) ta.focus();
  };
  bindField('in-comprador', (p,v)=>p.comprador=v);
  bindField('in-regiao', (p,v)=>p.regiao=v);
  bindField('in-data', (p,v)=>p.data=v);
  bindField('in-clientes', (p,v)=>p.clientes=parseFloat(v)||0);
  bindMoneyField('in-mrr', (p,v)=>p.mrr=v);

  bindField('in-pdd', (p,v)=>p.pddPct=parseFloat(v)||0);
  bindField('in-metamargem', (p,v)=>p.metaMargem=parseFloat(v)||0);
  bindField('in-metapayback', (p,v)=>p.metaPayback=parseFloat(v)||0);
  bindField('in-multmrr', (p,v)=>p.multMRR=parseFloat(v)||0);
  bindField('in-multebitda', (p,v)=>p.multEBITDA=parseFloat(v)||0);
  bindField('in-fin-selic', (p,v)=>p.finSelic=parseFloat(v)||0);
  bindField('in-fin-carencia', (p,v)=>p.finCarenciaTri=parseFloat(v)||0);
  bindField('in-fin-parcelas', (p,v)=>p.finParcelasTri=parseFloat(v)||1);
  bindField('in-fin-flat', (p,v)=>p.finFlatPct=parseFloat(v)||0);
  bindField('in-fin-ir', (p,v)=>p.finIRPct=parseFloat(v)||0);
  bindMoneyField('in-intencao-valor', (p,v)=>p.intencaoVendaValor=v);
  bindMoneyField('in-fin-valor', (p,v)=>p.finValorOverride=v);

  document.querySelectorAll('[data-add]').forEach(btn=>{
    btn.onclick = () => {
      const type = btn.dataset.add; const p = current();
      if(type==='atual'){ p.custosAtual.push({cat:'DO',item:'Novo item',qtd:1,valor:0}); buildCostTable('custosAtual','tbl-atual'); }
      if(type==='comprador'){ p.custosComprador.push({cat:'DO',item:'Novo item',qtd:1,valor:0}); buildCostTable('custosComprador','tbl-comprador'); }
      if(type==='invest'){ p.investimentos.push({cat:'Outros',item:'Novo item',tipo:'One-off',qtd:1,valor:0,propostaLink:null}); buildInvestTable(); }
      if(type==='proposta'){ p.propostas.push({id:novoId('pr'),nome:'Nova Proposta',valor:400000,entrada:50,parcelas:12}); buildPropostasTable(); buildInvestTable(); }
      recomputeAll(); saveApp();
    };
  });

  document.getElementById('tabbar').querySelectorAll('button').forEach(btn=>{
    btn.onclick = () => { activeTab = btn.dataset.tab; applyTab(); };
  });
}
function applyTab(){
  document.querySelectorAll('#tabbar button').forEach(b=> b.classList.toggle('active', b.dataset.tab===activeTab));
  document.querySelectorAll('.tabpanel').forEach(pnl=> pnl.classList.toggle('active', pnl.dataset.panel===activeTab));
  if(activeTab==='rede') initMapIfNeeded();
}

/* ======================================================================
   ARMAZENAMENTO DO ARQUIVO KMZ/KML (IndexedDB)
   O arquivo em si (base64) NUNCA vai para o localStorage/app JSON — só
   cabe uns 5-10MB no total ali, e um KMZ de rede real estoura isso fácil.
   Fica guardado à parte, neste navegador, indexado pelo id do provedor.
====================================================================== */
const KMZ_DB_NAME = 'aquisicoes_kmz_db';
const KMZ_STORE = 'arquivos';
function openKmzDb(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(KMZ_DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(KMZ_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function kmzDbPut(id, value){
  const db = await openKmzDb();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(KMZ_STORE, 'readwrite');
    tx.objectStore(KMZ_STORE).put(value, id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function kmzDbGet(id){
  const db = await openKmzDb();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(KMZ_STORE, 'readonly');
    const req = tx.objectStore(KMZ_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function kmzDbDelete(id){
  const db = await openKmzDb();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(KMZ_STORE, 'readwrite');
    tx.objectStore(KMZ_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

function dataUrlToBlob(dataUrl){
  const [meta, b64] = dataUrl.split(',');
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  const mimeMatch = meta.match(/data:(.*);base64/);
  return new Blob([arr], {type: mimeMatch?mimeMatch[1]:'application/octet-stream'});
}

async function extractKMLFromBlob(blob, filename){
  const buf = await blob.arrayBuffer();
  if(/\.kmz$/i.test(filename)){
    const zip = await JSZip.loadAsync(buf);
    const kmlEntry = Object.values(zip.files).find(f=>/\.kml$/i.test(f.name) && !f.dir);
    if(!kmlEntry) throw new Error('Nenhum arquivo .kml encontrado dentro do KMZ.');
    return await kmlEntry.async('text');
  }
  return new TextDecoder('utf-8').decode(buf);
}

// Classifica um ponto (Caixa/CTO x CEO) pelo nome/pasta do placemark.
// Cobre tanto nomes completos ("CTO", "CAIXA DE EMENDA") quanto siglas
// comuns em projetos reais (ex: "CT10B", "CT1.OT" = caixa; "CEO AEREA" = CEO).
function classifyPlacemark(name, folderName){
  const text = ((name||'') + ' ' + (folderName||'')).toUpperCase();
  if(/\bCEO\b|CAIXA DE EMENDA/.test(text)) return 'ceo';
  if(/\bCTO\b|CT\d|CAIXA TERMINAL|\bNAP\b|\bCAIXA\b/.test(text)) return 'caixa';
  return 'outro';
}

// Classifica um cabo (LineString) pelo modelo/bitola de fibra (6FO, 12FO,
// 24FO...), procurando no nome e na descrição do placemark. Quando um
// mesmo cabo menciona mais de uma bitola (rota com vários trechos), fica
// com a maior — normalmente é o tronco principal daquele segmento.
// 1ª tentativa: bitola escrita direto no nome/descrição do próprio cabo
// (ex: "CABO 12FO"). Mais direto quando existe.
function classifyLineModel(name, desc){
  const text = ((name||'') + ' ' + (desc||'')).toUpperCase();
  const bitolas = [...text.matchAll(/(\d+)\s*F\.?O\.?\b/g)].map(m=>parseInt(m[1],10)).filter(n=>isFinite(n));
  if(!bitolas.length) return null;
  return Math.max(...bitolas);
}

// 2ª tentativa (mais comum na prática): a cor da linha no KMZ indica a
// bitola, com uma legenda escrita em algum lugar do arquivo (ex: "FIBRA
// VERDE = 6 FO"). Resolve a cor de cada Placemark através de Style/StyleMap.
const NAMED_LINE_COLORS = [
  {name:'verde', rgb:[0,255,0]}, {name:'amarela', rgb:[255,255,0]},
  {name:'ciano', rgb:[0,255,255]}, {name:'azul', rgb:[0,0,255]},
  {name:'vermelha', rgb:[255,0,0]}, {name:'branca', rgb:[255,255,255]},
  {name:'preta', rgb:[0,0,0]}, {name:'laranja', rgb:[255,165,0]},
  {name:'roxa', rgb:[160,32,240]}, {name:'rosa', rgb:[255,0,255]},
];
const NOME_COR_NORM = {AMARELO:'amarela', BRANCO:'branca', PRETO:'preta', VERMELHO:'vermelha', ROXO:'roxa'};

function kmlColorToRgb(hex){
  if(!hex || hex.length!==8) return null;
  return [parseInt(hex.slice(6,8),16), parseInt(hex.slice(4,6),16), parseInt(hex.slice(2,4),16)]; // aabbggrr -> rgb
}
function nomeCorMaisProxima(rgb){
  let melhor = null, menorDist = Infinity;
  NAMED_LINE_COLORS.forEach(c=>{
    const d = (rgb[0]-c.rgb[0])**2 + (rgb[1]-c.rgb[1])**2 + (rgb[2]-c.rgb[2])**2;
    if(d < menorDist){ menorDist = d; melhor = c.name; }
  });
  return melhor;
}
// Varre todas as descrições do KML procurando algo como "VERDE = 6 FO".
function extrairLegendaCoresFO(doc){
  const legenda = {};
  const texto = [...doc.getElementsByTagName('description')].map(d=>d.textContent||'').join(' \n ').toUpperCase();
  const re = /(VERDE|AMARELA|AMARELO|BRANCA|BRANCO|PRETA|PRETO|AZUL|VERMELHA|VERMELHO|LARANJA|ROXA|ROXO|CIANO|ROSA)S?\s*[:=]?\s*(\d+)\s*F\.?O\.?\b/g;
  let m;
  while((m = re.exec(texto))){
    legenda[NOME_COR_NORM[m[1]] || m[1].toLowerCase()] = parseInt(m[2],10);
  }
  return legenda;
}
function buildStyleColorMaps(doc){
  const styleColor = new Map(); // id do Style -> cor (aabbggrr)
  [...doc.getElementsByTagName('Style')].forEach(el=>{
    const id = el.getAttribute('id'); if(!id) return;
    const cor = el.getElementsByTagName('LineStyle')[0]?.getElementsByTagName('color')[0]?.textContent?.trim();
    if(cor) styleColor.set(id, cor);
  });
  const styleMap = new Map(); // id do StyleMap -> id do Style "normal"
  [...doc.getElementsByTagName('StyleMap')].forEach(el=>{
    const id = el.getAttribute('id'); if(!id) return;
    const par = [...el.getElementsByTagName('Pair')].find(p=>p.getElementsByTagName('key')[0]?.textContent?.trim()==='normal');
    const url = par?.getElementsByTagName('styleUrl')[0]?.textContent?.trim();
    if(url) styleMap.set(id, url.replace(/^#/,''));
  });
  return {styleColor, styleMap};
}
function resolveLineColorHex(styleUrlRaw, maps){
  let ref = (styleUrlRaw||'').replace(/^#/,'');
  if(!ref) return null;
  const visitados = new Set();
  while(!maps.styleColor.has(ref) && maps.styleMap.has(ref) && !visitados.has(ref)){
    visitados.add(ref);
    ref = maps.styleMap.get(ref);
  }
  return maps.styleColor.get(ref) || null;
}

function haversineMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = d => d*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function polylineLengthMeters(latlngs){
  let total = 0;
  for(let i=1;i<latlngs.length;i++) total += haversineMeters(latlngs[i-1][0], latlngs[i-1][1], latlngs[i][0], latlngs[i][1]);
  return total;
}

function parseKML(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  if(doc.querySelector('parsererror')) throw new Error('KML inválido ou corrompido.');
  const placemarks = [...doc.getElementsByTagName('Placemark')];
  const layer = L.featureGroup();
  let count = 0;
  let caixas = 0, ceos = 0, outros = 0, cabosCount = 0, metragemTotal = 0;
  const cabosPorModelo = {}; // preenchido dinamicamente conforme as bitolas encontradas
  const styleMaps = buildStyleColorMaps(doc);
  const legendaCoresFO = extrairLegendaCoresFO(doc);
  const coordsToLatLngs = txt => txt.trim().split(/\s+/).filter(Boolean).map(c=>{
    const parts = c.split(',').map(Number); return [parts[1], parts[0]];
  });
  placemarks.forEach(pm=>{
    const name = pm.getElementsByTagName('name')[0]?.textContent?.trim() || '';
    const desc = pm.getElementsByTagName('description')[0]?.textContent?.trim() || '';
    const popupHtml = `<b>${name||'Sem nome'}</b>${desc?'<br>'+desc.slice(0,200):''}`;
    const folderEl = pm.closest ? pm.closest('Folder') : null;
    const folderName = folderEl ? (folderEl.getElementsByTagName('name')[0]?.textContent?.trim() || '') : '';

    const point = pm.getElementsByTagName('Point')[0];
    if(point){
      const c = point.getElementsByTagName('coordinates')[0]?.textContent;
      if(c){ const [lon,lat] = c.trim().split(',').map(Number);
        if(isFinite(lat)&&isFinite(lon)){
          const tipo = classifyPlacemark(name, folderName);
          const cor = tipo==='ceo' ? '#fb923c' : tipo==='caixa' ? '#00d4c8' : '#8b99b6';
          L.circleMarker([lat,lon], {radius:5, color:cor, fillColor:cor, fillOpacity:.9, weight:1.5}).bindPopup(popupHtml).addTo(layer);
          if(tipo==='ceo') ceos++; else if(tipo==='caixa') caixas++; else outros++;
          count++;
        }
      }
    }
    const line = pm.getElementsByTagName('LineString')[0];
    if(line){
      const c = line.getElementsByTagName('coordinates')[0]?.textContent;
      if(c){ const ll = coordsToLatLngs(c); if(ll.length>1){
        const styleUrlRaw = pm.getElementsByTagName('styleUrl')[0]?.textContent?.trim() || '';
        const colorHex = resolveLineColorHex(styleUrlRaw, styleMaps);
        const rgbReal = colorHex ? kmlColorToRgb(colorHex) : null;

        let chave, label;
        const bitolaDireta = classifyLineModel(name, desc);
        if(bitolaDireta != null){
          chave = String(bitolaDireta); label = bitolaDireta+' FO';
        } else {
          const nomeCor = rgbReal ? nomeCorMaisProxima(rgbReal) : null;
          const fo = nomeCor ? legendaCoresFO[nomeCor] : undefined;
          if(fo != null){ chave = String(fo); label = fo+' FO'; }
          else if(nomeCor){ chave = 'cor_'+nomeCor; label = 'Cabo cor '+nomeCor.charAt(0).toUpperCase()+nomeCor.slice(1)+' (bitola não identificada)'; }
          else { chave = 'outro'; label = 'Não identificado'; }
        }
        const corLinha = rgbReal ? '#'+rgbReal.map(v=>v.toString(16).padStart(2,'0')).join('') : '#8b99b6';
        const metros = polylineLengthMeters(ll);
        L.polyline(ll, {color:corLinha, weight:3}).bindPopup(popupHtml).addTo(layer);
        cabosCount++;
        metragemTotal += metros;
        if(!cabosPorModelo[chave]) cabosPorModelo[chave] = {label, count:0, metros:0};
        cabosPorModelo[chave].count++;
        cabosPorModelo[chave].metros += metros;
        count++;
      } }
    }
    const poly = pm.getElementsByTagName('Polygon')[0];
    if(poly){
      const c = poly.getElementsByTagName('coordinates')[0]?.textContent;
      if(c){ const ll = coordsToLatLngs(c); if(ll.length>2){ L.polygon(ll, {color:'#fb7185', fillOpacity:.15, weight:2}).bindPopup(popupHtml).addTo(layer); count++; } }
    }
  });
  return {layer, count, stats:{caixas, ceos, outros, cabosCount, metragemTotal, cabosPorModelo}};
}

function fmtMetros(m){
  return m>=1000 ? (m/1000).toLocaleString('pt-BR',{maximumFractionDigits:2})+' km' : fmtNum(Math.round(m))+' m';
}

function renderKmzStatsPanel(){
  const block = document.getElementById('kmzStatsBlock');
  if(!block) return;
  if(!currentKmzStats){ block.style.display = 'none'; return; }
  block.style.display = '';
  const p = current();
  if(!p.kmzCustoMetroPorModelo) p.kmzCustoMetroPorModelo = {};
  const s = currentKmzStats;
  setText('kpi-kmz-caixas', fmtNum(s.caixas));
  setText('kpi-kmz-ceos', fmtNum(s.ceos));
  setText('kpi-kmz-cabos', fmtNum(s.cabosCount));
  setText('kpi-kmz-metragem', fmtMetros(s.metragemTotal));

  const chaves = Object.keys(s.cabosPorModelo).sort((a,b)=>{
    if(a==='outro') return 1; if(b==='outro') return -1;
    return Number(a)-Number(b);
  });
  const tbody = document.getElementById('kmz-cabos-body');
  if(tbody){
    tbody.innerHTML = chaves.map(chave=>{
      const d = s.cabosPorModelo[chave];
      const custo = p.kmzCustoMetroPorModelo[chave] || 0;
      return `<tr>
        <td>${esc(d.label)}</td>
        <td class="qty">${fmtNum(d.count)}</td>
        <td class="qty">${fmtMetros(d.metros)}</td>
        <td><input type="number" class="kmz-custo-metro-modelo" data-chave="${esc(chave)}" step="0.1" value="${custo||''}" placeholder="0"></td>
        <td class="computed">${fmtBRL(d.metros*custo)}</td>
      </tr>`;
    }).join('') || `<tr><td colspan="5" style="color:var(--text-dim);">Nenhum cabo encontrado no arquivo.</td></tr>`;
    tbody.querySelectorAll('.kmz-custo-metro-modelo').forEach(inp=>{
      inp.oninput = e => {
        const pp = current();
        if(!pp.kmzCustoMetroPorModelo) pp.kmzCustoMetroPorModelo = {};
        pp.kmzCustoMetroPorModelo[e.target.dataset.chave] = parseFloat(e.target.value)||0;
        renderKmzStatsPanel();
        saveApp();
      };
    });
  }

  const valorCabos = chaves.reduce((sum,chave)=> sum + s.cabosPorModelo[chave].metros*(p.kmzCustoMetroPorModelo[chave]||0), 0);
  const valor = s.caixas*(p.kmzCustoCaixa||0) + s.ceos*(p.kmzCustoCeo||0) + valorCabos;
  setText('kpi-kmz-valor', fmtBRL(valor));
}

// Limite de folga pra sincronizar o KMZ com a nuvem (documento à parte,
// dentro do teto de ~1MB por documento do Firestore). Arquivos maiores
// que isso ficam só neste navegador (IndexedDB), como antes.
const KMZ_LIMITE_NUVEM = 900000;

// Busca o arquivo local primeiro (rápido); se não achar, tenta a nuvem
// (outro dispositivo pode ter enviado) e guarda uma cópia local também.
async function getKmzFile(p){
  const local = await kmzDbGet(p.id);
  if(local) return local;
  if(!window._fbGetKmz) return null;
  try{
    const remoto = await window._fbGetKmz(p.id);
    if(remoto){
      kmzDbPut(p.id, remoto).catch(()=>{});
      return remoto;
    }
  }catch(e){ console.error('Falha ao buscar KMZ na nuvem:', e); }
  return null;
}

async function loadKmlIntoMap(p){
  try{
    if(currentKmlLayer){ leafletMap.removeLayer(currentKmlLayer); currentKmlLayer=null; }
    const stored = await getKmzFile(p);
    if(!stored){
      document.getElementById('mapMeta').innerHTML = `<span style="color:var(--bad)">Arquivo não encontrado (nem neste navegador, nem na nuvem). Envie novamente.</span>`;
      currentKmzStats = null; renderKmzStatsPanel();
      return;
    }
    const blob = dataUrlToBlob(stored.dataUrl);
    const kmlText = await extractKMLFromBlob(blob, stored.name);
    const {layer, count, stats} = parseKML(kmlText);
    layer.addTo(leafletMap);
    currentKmlLayer = layer;
    const bounds = layer.getBounds ? layer.getBounds() : null;
    if(count>0 && bounds && bounds.isValid()) leafletMap.fitBounds(bounds, {padding:[30,30]});
    document.getElementById('mapMeta').innerHTML = `<span>Arquivo: <b style="color:var(--text)">${esc(stored.name)}</b></span><span>Elementos: <b style="color:var(--text)">${count}</b></span>`;
    currentKmzStats = stats;
    renderKmzStatsPanel();
  }catch(err){
    document.getElementById('mapMeta').innerHTML = `<span style="color:var(--bad)">Erro ao ler o arquivo: ${esc(err.message)}</span>`;
    currentKmzStats = null; renderKmzStatsPanel();
  }
}

function bindKmzControls(){
  const input = document.getElementById('kmzInput');
  document.getElementById('kmzUploadBtn').onclick = () => input.click();
  input.onchange = async () => {
    const file = input.files[0]; if(!file) return;
    if(!/\.(kmz|kml)$/i.test(file.name)){ alert('Envie um arquivo .kmz ou .kml'); return; }
    const reader = new FileReader();
    reader.onload = async () => {
      const p = current();
      const kmzData = { name:file.name, dataUrl:reader.result };
      try{
        await kmzDbPut(p.id, kmzData);
        p.kmz = { name:file.name };
        saveApp();
        initMapIfNeeded();
      }catch(e){
        console.error('Falha ao salvar KMZ:', e);
        alert('Não foi possível salvar o arquivo de rede neste navegador (sem espaço ou sem suporte a IndexedDB).');
        return;
      }
      if(kmzData.dataUrl.length <= KMZ_LIMITE_NUVEM && window._fbSaveKmz){
        window._fbSaveKmz(p.id, kmzData).catch(e=>console.error('Falha ao sincronizar KMZ com a nuvem:', e));
      }else if(kmzData.dataUrl.length > KMZ_LIMITE_NUVEM){
        alert('Este arquivo é grande demais pra sincronizar com a equipe — fica salvo só neste navegador. Se precisar que apareça em outro dispositivo, envie um KMZ menor ou peça pra enviar direto lá também.');
      }
    };
    reader.readAsDataURL(file);
    input.value = '';
  };
  document.getElementById('kmzRemoveBtn').onclick = async () => {
    if(!confirm('Remover o arquivo de rede deste provedor?')) return;
    const p = current();
    try{ await kmzDbDelete(p.id); }catch(e){}
    if(window._fbDeleteKmz) window._fbDeleteKmz(p.id);
    p.kmz = null; saveApp();
    currentKmzStats = null;
    initMapIfNeeded();
  };
  document.getElementById('kmzDownloadBtn').onclick = async () => {
    const p = current(); if(!p.kmz) return;
    const stored = await getKmzFile(p);
    if(!stored){ alert('Arquivo não encontrado (nem local, nem na nuvem).'); return; }
    const blob = dataUrlToBlob(stored.dataUrl);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=stored.name; a.click();
    URL.revokeObjectURL(url);
  };
  [['in-kmz-custo-caixa','kmzCustoCaixa'],['in-kmz-custo-ceo','kmzCustoCeo']].forEach(([id, field])=>{
    const el = document.getElementById(id); if(!el) return;
    el.value = fmtMoneyInput(current()[field]);
    el.oninput = () => {
      const digitsBeforeCursor = el.value.slice(0, el.selectionStart).replace(/\D/g,'').length;
      const raw = parseMoneyInput(el.value);
      el.value = fmtMoneyInput(raw);
      let pos = 0, digits = 0;
      while(pos < el.value.length && digits < digitsBeforeCursor){ if(/\d/.test(el.value[pos])) digits++; pos++; }
      el.setSelectionRange(pos, pos);
      current()[field] = raw; renderKmzStatsPanel(); saveApp();
    };
  });
  renderKmzStatsPanel();
}

/* ======================================================================
   SPREADSHEET IMPORT (.xlsx / .xls / .csv)
====================================================================== */
const normKey = k => String(k||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');

function parseNumberBR(v){
  if(v===undefined || v===null || v==='') return NaN;
  if(typeof v==='number') return v;
  let s = String(v).trim().replace(/[R$\s]/g,'');
  if(s.includes(',') && s.includes('.')) s = s.replace(/\./g,'').replace(',', '.');
  else if(s.includes(',')) s = s.replace(',', '.');
  return parseFloat(s);
}
function numOr(v,d){ const n=parseNumberBR(v); return isFinite(n)?n:d; }

function rowGet(row, ...candidates){
  const keys = Object.keys(row).map(k=>({raw:k, n:normKey(k)}));
  for(const c of candidates){
    const cn = normKey(c);
    let hit = keys.find(k=>k.n===cn);
    if(!hit) hit = keys.find(k=>k.n.startsWith(cn) || cn.startsWith(k.n));
    if(!hit) hit = keys.find(k=>k.n.includes(cn));
    if(hit){ const v = row[hit.raw]; if(v!==undefined && v!=='') return v; }
  }
  return undefined;
}

/* Locates the real header row (which may not be row 1 — many spreadsheets have a
   title row, blank rows, or summary KPIs above the actual data table) by scanning
   for a row containing one of the given hint words, then returns the data below
   it as an array of objects keyed by that header row. */
function sheetToRowsSmart(ws, headerHints){
  if(!ws) return [];
  const aoa = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  let headerRowIdx = -1;
  for(let i=0;i<aoa.length;i++){
    const rowNorm = aoa[i].map(c=>normKey(c)).filter(Boolean);
    if(headerHints.some(h=> rowNorm.some(cell=>cell===normKey(h)))){ headerRowIdx = i; break; }
  }
  if(headerRowIdx===-1) return [];
  const headers = aoa[headerRowIdx];
  const rows = [];
  for(let i=headerRowIdx+1;i<aoa.length;i++){
    const r = aoa[i];
    if(!r || r.every(c=>c===''||c==null)) continue;
    const obj = {};
    headers.forEach((h,idx)=>{ if(h!=='' && h!=null) obj[h]=r[idx]; });
    rows.push(obj);
  }
  return rows;
}

function parseCostRows(rows){
  return rows.map(r=>({
    cat: String(rowGet(r,'Categoria','Cat')||'DO'),
    item: String(rowGet(r,'Item','Descricao','Descrição')||'').trim(),
    qtd: numOr(rowGet(r,'Qtd','Quantidade'),1),
    valor: numOr(rowGet(r,'ValorUnitario','Valor Unitario','Valor Unitário','VrUnitario','Valor'),0),
  })).filter(r=>r.item);
}
function parseInvestRows(rows){
  return rows.map(r=>({
    cat: String(rowGet(r,'Categoria','Cat')||'Outros'),
    item: String(rowGet(r,'Item','Descricao','Descrição')||'').trim(),
    tipo: String(rowGet(r,'Tipo')||'One-off'),
    qtd: numOr(rowGet(r,'Qtd','Quantidade'),1),
    valor: numOr(rowGet(r,'ValorUnitario','Valor Unitario','Valor Unitário','VrUnitario','Valor'),0),
  })).filter(r=>r.item);
}
function parsePropRows(rows){
  return rows.map(r=>({
    nome: String(rowGet(r,'Nome','Proposta')||'Proposta'),
    valor: numOr(rowGet(r,'Valor','Oferta','ValorOferta'),0),
    entrada: numOr(rowGet(r,'EntradaPct','Entrada%','Entrada'),50),
    parcelas: numOr(rowGet(r,'Parcelas','NParcelas','NumParcelas'),12),
  })).filter(r=>r.valor>0);
}
function normalizeDateVal(v){
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  if(typeof v==='string' && /^\d{4}-\d{2}-\d{2}/.test(v.trim())) return v.trim().slice(0,10);
  return new Date().toISOString().slice(0,10);
}
function parseIdentSheetAOA(rows){
  const dict = []; // [{n: normalizedLabel, v: value}]
  rows.forEach(r=>{
    if(!r || r.length<2) return;
    const label = String(r[0]||'').trim();
    const n = normKey(label);
    if(!n || n==='campo') return;
    if(r[1]===''||r[1]==null) return;
    dict.push({n, v:r[1]});
  });
  const find = (...labels)=>{
    for(const l of labels){
      const ln = normKey(l);
      let hit = dict.find(d=>d.n===ln);
      if(!hit) hit = dict.find(d=>d.n.includes(ln) || ln.includes(d.n));
      if(hit) return hit.v;
    }
    return undefined;
  };
  const out = {
    nome: find('empresa alvo','empresa'),
    comprador: find('comprador'),
    regiao: find('regiao cidade','regiao','cidade'),
    data: normalizeDateVal(find('data da analise','data')),
    clientes: numOr(find('clientes ativos','clientes'), undefined),
    mrr: numOr(find('mrr mensal','receita mensal mrr','mrr'), undefined),
    impostosPct: numOr(find('impostos sobre receita','impostos'), undefined),
    pddPct: numOr(find('inadimplencia pdd','pdd'), undefined),
    status: find('status da negociacao','status'),
    metaMargem: numOr(find('meta minima de margem ebitda','meta margem ebitda','meta margem'), undefined),
    metaPayback: numOr(find('meta maxima de payback','meta payback'), undefined),
    multMRR: numOr(find('multiplo alvo ev mrr','ev mrr'), undefined),
    multEBITDA: numOr(find('multiplo alvo ev ebitda','ev ebitda'), undefined),
  };
  Object.keys(out).forEach(k=>{ if(out[k]===undefined) delete out[k]; });
  return out;
}

async function importSpreadsheetFile(file){
  try{
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array', cellDates:true});
    const findSheet = (...cands)=>{ for(const c of cands){ const hit = wb.SheetNames.find(n=>normKey(n)===normKey(c)); if(hit) return wb.Sheets[hit]; } return null; };

    const p = blankEmpresa('Provedor importado');

    const identWs = findSheet('Identificacao','Identificação','Ident','Info','01_Inputs','Inputs','01Inputs');
    if(identWs){
      const aoa = XLSX.utils.sheet_to_json(identWs, {header:1, defval:''});
      Object.assign(p, parseIdentSheetAOA(aoa));
    }
    const custosAtualWs = findSheet('Custos_Atual','CustosAtual','Custos Atual','02_Custos_Atual');
    if(custosAtualWs) p.custosAtual = parseCostRows(sheetToRowsSmart(custosAtualWs,['Categoria','Item']));

    const custosCompradorWs = findSheet('Custos_Comprador','CustosComprador','Custos Comprador','03_Custos_Comprador');
    if(custosCompradorWs) p.custosComprador = parseCostRows(sheetToRowsSmart(custosCompradorWs,['Categoria','Item']));

    const investWs = findSheet('Investimentos','Investimento','04_Invest_Iniciais','04_Investimentos_Iniciais','InvestIniciais');
    if(investWs) p.investimentos = parseInvestRows(sheetToRowsSmart(investWs,['Categoria','Item']));

    const propWs = findSheet('Propostas','Proposta');
    if(propWs) p.propostas = parsePropRows(sheetToRowsSmart(propWs,['Nome','Proposta','Valor']));

    // Fallback for a single generic sheet (typical of a plain .csv upload)
    const namedHits = [identWs, custosAtualWs, custosCompradorWs, investWs, propWs].filter(Boolean).length;
    if(namedHits===0 && wb.SheetNames.length){
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
      if(rows.length){
        const headerKeys = Object.keys(rows[0]).map(normKey);
        if(headerKeys.some(k=>k.includes('entrada')) && headerKeys.some(k=>k.includes('parcela'))){
          p.propostas = parsePropRows(rows);
        } else if(headerKeys.some(k=>k.includes('tipo'))){
          p.investimentos = parseInvestRows(rows);
        } else if(headerKeys.some(k=>k.includes('categoria')) || headerKeys.some(k=>k.includes('item'))){
          const cenarioKey = Object.keys(rows[0]).find(k=>normKey(k).includes('cenario'));
          if(cenarioKey){
            p.custosAtual = parseCostRows(rows.filter(r=>!normKey(String(r[cenarioKey])).includes('comprador')));
            p.custosComprador = parseCostRows(rows.filter(r=>normKey(String(r[cenarioKey])).includes('comprador')));
          } else {
            p.custosAtual = parseCostRows(rows);
          }
        } else if(headerKeys.some(k=>k.includes('campo'))){
          Object.assign(p, parseIdentSheetAOA(rows.map(r=>Object.values(r))));
        }
      }
    }

    if(!p.nome || p.nome==='Novo provedor' || p.nome==='Provedor importado'){
      p.nome = file.name.replace(/\.(xlsx|xls|csv)$/i,'') || 'Provedor importado';
    }
    app.empresas.push(p); app.currentId = p.id; saveApp(); renderAll();
    alert(`Provedor "${p.nome}" importado. Confira os valores nas abas e ajuste o que precisar.`);
  }catch(err){
    alert('Não foi possível importar essa planilha: '+err.message+'\n\nBaixe o modelo (.xlsx) para ver o formato esperado.');
  }
}
